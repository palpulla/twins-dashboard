# Housecall Pro API integration config. Pinned to real API on 2026-04-17.
endpoints:
  jobs_list: /jobs
  job_detail: /jobs/{id}
  line_items: /jobs/{id}/line_items
  invoices: /jobs/{id}/invoices
  employees: /employees

filters:
  # Work status value for jobs eligible for payroll. HCP uses "complete unrated".
  work_status: complete unrated

pagination:
  # HCP returns {page, page_size, total_pages, total_items, jobs}
  # per_page is ignored (always 10). Iterate by incrementing ?page=N until N > total_pages.
  page_size: 10

rate_limit:
  max_retries: 5
  backoff_base: 1.0
