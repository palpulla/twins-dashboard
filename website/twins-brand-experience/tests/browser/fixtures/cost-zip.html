<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wisconsin cost ZIP fixture</title>
  <link rel="stylesheet" href="/assets/css/twins-brand.css">
  <link rel="stylesheet" href="/assets/css/twins-brand-families.css">
  <script src="/assets/js/twins-brand.js" defer></script>
</head>
<body class="twins-brand-experience twins-brand-route-cost-madison">
  <main id="twins-overhaul-main" class="twins-overhaul-main twins-cost">
    <section class="twins-overhaul-section twins-cost-service-area">
      <div class="twins-overhaul-shell twins-cost-service-area__grid">
        <div class="twins-cost-zip" data-twins-overhaul-zip>
          <p class="twins-overhaul-eyebrow">Wisconsin service areas</p>
          <h1>Do we serve your ZIP code?</h1>
          <p>Enter your ZIP and we will point you toward the right Twins service area.</p>
          <label for="cost-zip">ZIP code</label>
          <div class="twins-cost-zip__controls">
            <input id="cost-zip" data-twins-zip-input inputmode="numeric" autocomplete="postal-code" maxlength="5" pattern="[0-9]{5}">
            <button type="button" data-twins-zip-route>Check My ZIP</button>
          </div>
          <p class="twins-cost-zip__status" data-twins-zip-status role="status" aria-live="polite">Enter a 5-digit ZIP code to review the matching local guide.</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
