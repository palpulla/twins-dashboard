ps://www.clopaydoor.com/images/default-source/product-images/garage-doors/colors/darkcedar.webp?sfvrsn=61760fa4_1","AlternativeText":"Dark Cedar","DisplayIndex":2,"GroupName":"","GroupIndex":null},{"Title":"Fir (F)","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/colors/fir.webp?sfvrsn=63a69743_1","AlternativeText":"Fir","DisplayIndex":3,"GroupName":"","GroupIndex":1},{"Title":"Mixed Cedar (C)","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/colors/mixedcedar.webp?sfvrsn=ff65677b_2","AlternativeText":"Mixed Cedar","DisplayIndex":4,"GroupName":"","GroupIndex":null},{"Title":"Redwood (R)","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/colors/redwood.webp?sfvrsn=caac8624_1","AlternativeText":"Redwood","DisplayIndex":6,"GroupName":"","GroupIndex":1}],"SpecialityGlassOptions":[{"Title":"Clear","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/glass-clear-efx.webp?sfvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"}],"SpecsModels":[],"TrackJambModels":[]},"26":{"ProductId":"26","Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Modern","ShortDescription":"Faux wood insulated garage doors with contemporary style","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/canyon-ridge-modern-roulette-medium-clear-cypress-showcase.webp?sfvrsn=890cb293_1","CanonicalUrl":"https://www.clopaydoor.com/canyon-ridge-modern-garage-doors","Overview":"<h3>Built for Modern Living</h3><h4>Engineered Strength</h4><p>Every Canyon Ridge&reg; Modern garage door has four layers &mdash; steel, insulation, more steel, and a tough faux-wood cladding with fiberglass-filled boards &mdash; all working together to deliver increased durability and security. Aesthetically, the doors have been updated with chamfered horizontal edges to create a refreshed, modern look.</p><h4>Faux Wood, Real Texture</h4><p>The composite cladding and overlays are molded from genuine wood pieces, so you get the rich texture and natural grain of Clear Cypress or Mahogany, without the maintenance headaches real wood brings. Choose from a range of paint and stain options to suit your home&rsquo;s style.</p><h4>Design Your Door</h4><p>With eight distinct door designs, optional slim windows or metal accents, and a palette of eight standard finishes (plus more than 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; custom colors</a>), it&rsquo;s easy to create a look that&rsquo;s truly yours.</p><h4>Superior Insulation</h4><p>Each door is packed with 2\" <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane insulation</a>, keeping your garage comfortable and energy efficient. R-values range from 6.3 to 20.4, depending on your chosen design.</p><h4>Weather Ready</h4><p>For homes in high-wind regions, <a href=\"https://www.clopaydoor.com/wind\">WindCode&reg; reinforcement</a> is available for added peace of mind.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Canyon Ridge&reg; Modern Construction</h3><p>The Canyon Ridge&reg; Modern garage door is engineered for lasting performance, comfort, and peace of mind. At its core is a tough steel base, built to withstand daily use and provide a solid foundation for your door. On top of this, you&rsquo;ll find low-maintenance, moisture-resistant composite overlays that capture the warmth and look of real wood, but won&rsquo;t rot, warp, or crack &mdash; even with heavy exposure to the elements.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-canyon-ridge-modern.webp?sfvrsn=8afd9d92_3\" alt=\"Canyon Ridge Modern\" sf-size=\"100\" /><ol><li>Cladding or Overlay (Full-View)</li><li>Steel</li><li>2\" Intellicore&reg; Polyurethane Insulation</li><li>Steel</li></ol><p>Inside, each door is filled with 2\" of Clopay&rsquo;s proprietary <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane insulation</a>. This advanced foam technology fills every inch of the door, making it warmer, quieter, and stronger than standard doors. You&rsquo;ll notice the difference in your garage&rsquo;s comfort, energy efficiency, and noise reduction.</p><p>The steel panels are treated with a multi-layer rust-prevention system, including galvanizing, a protective metal oxide layer, and a durable baked-on finish. The bottom of the door features a replaceable vinyl weather seal set in a rust-resistant aluminum retainer to keep out drafts, rain, and debris. Safety is built in, too, with a patented Safe-T-Bracket&reg; that helps prevent injuries during maintenance.</p><p>All Intellicore&reg; insulated doors come with smooth-gliding, 10-ball nylon rollers and extra-strong 14-gauge steel hinges for reliable, quiet operation. Removable window grilles make cleaning easy. Plus, every door complies with 2015 IECC air infiltration requirement of 0.40 cfm/ft2 or less (IECC, Section C402.5.2) to help keep your home more comfortable year-round.</p>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Canyon Ridge Modern","DisplayIndex":6,"ImageGallery":"https://www.clopaydoor.com/image-gallery/canyon-ridge-modern","ColorDisclaimer":"<p>*Black, white, bronze and charcoal only available in Mahogany.</p>","TopSectionDisclaimer":"","HardwareDisclaimer":"<p>Every Canyon Ridge&reg; Modern garage door comes standard with sleek Spade Lift Handles, designed for a clean look and easy operation. If you want to take your door&rsquo;s style a step further, you can upgrade to our optional Aluminum Grip Handle in various color options, which offers a more modern, streamlined feel and is available in a variety of finishes to match your home&rsquo;s aesthetic. </p>","DesignDisclaimer":"","RelatedProducts":[{"Title":"Modern Steel™","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/modern-steel-flush_fullview-window-black-garage-door-595.webp?sfvrsn=db7014e9_14","Id":"170","Url":"https://www.clopaydoor.com/modern-steel-collection","DisplayIndex":7,"ShortDescription":"Subtle modern beauty, simple up-keep","AlternativeText":"Modern Steel"},{"Title":"Avante<sup class='symbolstxt'>®</sup> – Now Available with C-Power™ Technology","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/tnahcpower01showcase.webp?sfvrsn=e1a1ed6c_1","Id":"16","Url":"https://www.clopaydoor.com/avante","DisplayIndex":9,"ShortDescription":"Aluminum and glass doors that make your garage a stunning focal point, providing natural light by day and a dramatic glow at night","AlternativeText":"Avante"},{"Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Modern","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-modern-design-cladding-solid-garage-door-595.webp?sfvrsn=b04b7a7a_9","Id":"25","Ur ial Options","DisplayIndex":1,"GroupName":"Plank Cladding","GroupIndex":1},{"Title":"Mahogany","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/plankcladding-mahogany164.webp?sfvrsn=8b92733f_2","AlternativeText":"Material Options","DisplayIndex":2,"GroupName":"Plank Cladding","GroupIndex":1},{"Title":"Mahogany","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/overlay-mahogany164.webp?sfvrsn=adbfe28d_2","AlternativeText":"Material Options","DisplayIndex":2,"GroupName":"Full-View Overlay","GroupIndex":3},{"Title":"Mahogany","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/metalcladding-mahogany164.webp?sfvrsn=55a77642_2","AlternativeText":"Material Options","DisplayIndex":2,"GroupName":"Metal (Aluminum) Inlay Cladding","GroupIndex":2}],"SpecialityGlassOptions":[{"Title":"Clear","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/glass-clear-efx.webp?sfvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Rain*","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/rain-gray-glass.webp?sfvrsn=7d7ca980_2","DisplayIndex":2,"AlternativeText":"Rain"},{"Title":"Frosted*","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure*","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"}],"SpecsModels":[],"TrackJambModels":[]},"27":{"ProductId":"27","Title":"Grand Harbor<sup class='symbolstxt'>®</sup>","ShortDescription":"When budget is the deciding factor, this low-maintenance, insulation-optional steel frame carriage house style garage door combines clean lines and classic charm","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/grand-harbor-schanen-595.webp?sfvrsn=91e18ec0_2","CanonicalUrl":"https://www.clopaydoor.com/grandharbor","Overview":"<h3>Beautiful and Budget Friendly</h3><h4>Sturdy Multi-Layer Construction</h4><p>Choose from 2- or 3-layer designs, featuring a 24-gauge steel base and smooth composite overlays for strength you can count on.</p><h4>Carriage House Style</h4><p>The flush steel door is topped with composite overlays, giving you that timeless wood-look charm without all the maintenance.</p><h4>Versatile Finishes</h4><p>Select from a range of painted finishes to match your home or ask about custom colors to make your door truly your own.</p><h4>Optional Insulation</h4><p>Boost comfort and efficiency with 1-5/8\" vinyl-backed <a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-materials/insulation\">polystyrene insulation</a> (R-value 6.3), helping keep your garage more comfortable in any season.</p><h4>Weather-Ready Performance</h4><p>Available <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> means your door stands up to tough winds and storms.</p><h4>Environmental Assurance</h4><p>Clopay\r\n doors are compliant with environmental laws and regulations. Clopay\r\n    doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>Designed for Strength, Safety, and Easy Care</h3><p>Grand Harbor&reg; garage doors are built to handle real life, inside and out. At its core, you&rsquo;ll find a rugged 24-gauge steel base which is strong enough to stand up to years of daily use. A smooth composite overlay adds the carriage house look and resists dents, warping, and the effects of weather. Choose optional 1-5/8\" polystyrene insulation to keep your garage more comfortable, providing an R-value of 6.3 for added energy savings.</p><p>Durability comes standard thanks to Clopay&rsquo;s multi-layer rust-prevention system: a hot-dipped galvanized steel layer, protective metal oxide pre-treatment, plus a baked-on primer and topcoat. The replaceable vinyl bottom weather seal in a rust-free aluminum retainer keeps out drafts, rain, and debris. For peace of mind, every Grand Harbor&reg; includes the Safe-T-Bracket&reg;, designed to prevent injuries if the bottom bracket is ever removed under tension. Removable grilles make cleaning windows a breeze, so your door looks sharp year after year.</p><p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-grand-harbor.webp?sfvrsn=7c766104_4\" alt=\"Grand Harbor\" sf-size=\"7198\" /></p><ol><li>Smooth composite overlay</li><li>Steel</li><li>1 5/8\" polystyrene insulation (optional)</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Grand Harbor","DisplayIndex":13,"ImageGallery":"https://www.clopaydoor.com/image-gallery/grand-harbor","ColorDisclaimer":"<p>Grand Harbor&reg; doors feature four woodgrain-textured, hot-dipped galvanized steel base colors: Standard White, Almond, Desert Tan, and Sandtone. The overlay is offered in Standard White only. If you want to personalize your door, you can paint it with a high-quality exterior latex paint. For even more customization, Clopay&rsquo;s <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> factory-finishing option lets you choose from over 1,500 Sherwin-Williams&reg; paint colors, all applied using a durable two-part system that&rsquo;s tested and backed by a five-year warranty.</p>","TopSectionDisclaimer":"<p>Grand Harbor&reg; offers a wide range of options to help you style the top of your garage door, giving you the flexibility to match your home&rsquo;s architecture and create just the right look. For a clean, traditional appearance, solid top sections are available in rectangular, square, and arched designs, making it easy to complement both classic and more modern home styles. These solid tops add a tailored finish and can be customized to suit the lines of your fa&ccedil;ade.</p><p>If you want the look of windows but prefer added privacy and security, faux top sections are a smart choice. These feature a solid dark gray steel background with overlays in arch, square, or rectangular grille patterns, creating the illusion of real windows without sacrificing safety. The effect is striking from the curb, offering visual interest while keeping your garage fully secure.</p><p>For those who do want natural light or a decorative touch, glazed top sections offer plenty of options. You can choose clear or obscure glass and combine them with snap-in grilles for square and rectangular patterns. For a bit more personality, wrought iron window styles feature a black iron-look design on seeded-look acrylic panels. These windows channel an Old-World European feel, making them a great pairing with decorative entry doors, exterior lighting, or other architectural accents.</p><p>Grand Harbor&reg; also provides specialty arched and faux window options to fit a variety of spaces, including double doors and unique configurations. With all these configurations&mdash;solid, faux, or glazed&mdash;it&rsquo;s easy to design a garage door that&rsquo;s understated or one that becomes a real focal point of your home&rsquo;s exterior.</p><p><em>*Faux windows</em></p>","HardwareDisclaimer":"","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ImageUrl":"https:// ://www.clopaydoor.com/images/default-source/product-images/product-designs/grandharbor/grand-harbor-design-36.webp?sfvrsn=77addf71_2","Description":"Grand Harbor- Design 36","AlternativeText":"Design 36"},{"Title":"Design 13","GroupName":"Series 1","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/grandharbor/grand-harbor-design-13.webp?sfvrsn=306126b8_2","Description":"Grand Harbor - Design13","AlternativeText":"Design 13"},{"Title":"Design 21","GroupName":"Series 2","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/grandharbor/grand-harbor-design-21.webp?sfvrsn=85e9e30c_2","Description":"Grand Harbor - Design21","AlternativeText":"Design 21"},{"Title":"Design 22","GroupName":"Series 2","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/grandharbor/grand-harbor-design-22.webp?sfvrsn=2445ea82_2","Description":"Grand Harbor - Design22","AlternativeText":"Design 22"},{"Title":"Design 41","GroupName":"Series 4","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/grandharbor/grand-harbor-design-41.webp?sfvrsn=b7adb4f7_2","Description":"Grand Harbor- Design 41","AlternativeText":"Design 41"}],"MaterialOptions":[],"SpecialityGlassOptions":[],"SpecsModels":[],"TrackJambModels":[]},"29":{"ProductId":"29","Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (4-Layer)","ShortDescription":"Stylish, low maintenance and insulated faux wood garage doors","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr4l-d21-rec13-afp143r.webp?sfvrsn=8ae1d536_3","CanonicalUrl":"https://www.clopaydoor.com/canyon-ridge-4-layer","Overview":"<h3>Built for Long-Lasting Curb Appeal</h3><h4>Strong 4-Layer Construction</h4><p>The Canyon Ridge&reg; Carriage House (4-Layer) door is made with a steel base, <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane insulation</a>, another steel layer, and a composite overlay&mdash;so you get durability, energy efficiency, and lasting good looks.</p><h4>Authentic Wood Appearance</h4><p>The faux wood composite overlay is molded from real wood, capturing all the charm and natural texture of classic carriage house doors without the maintenance headaches.</p><h4>Customizable Design Options</h4><p>Choose from 15 carriage house styles, optional windows, and eye-catching decorative hardware to make your door your own. Pick from 8 standard finishes or go bold with more than 1,500 custom <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">ColorBlast&reg; paint colors</a>.</p><h4>Energy-Saving Insulation</h4><p>With a 2\" thick Intellicore&reg; polyurethane core (R-value 18.4), your garage stays more comfortable all year.</p><h4>Weather-Ready Protection</h4><p><a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; door reinforcement</a> is available for extra peace of mind in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>Performance You Can Rely On</h3><p>Each Canyon Ridge&reg; Carriage House (4-Layer) garage door is designed for strength, insulation, and low maintenance. The foundation is a heavy-duty steel base that offers solid support and long-lasting durability. On top of that, a second layer of steel adds extra strength, while Clopay&rsquo;s exclusive Intellicore&reg; polyurethane insulation&mdash;2\" thick&mdash;is sandwiched in between. This insulation delivers excellent thermal efficiency with an R-value of 18.4, helping keep your garage comfortable and quiet.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-canyon-ridge-ch-4l.webp?sfvrsn=21f269c4_4\" alt=\"Cutaway Canyon Ridge 4 Layer\" sf-size=\"8608\" /><br /><ol><li>Composite Overlay</li><li>Steel with <a href=\"https://www.clopaydoor.com/residential/buyingguide/ultra-grain\">Ultra-Grain&reg; Paint Finish</a> (Shown) or Solid Color Steel</li><li>2\" Intellicore&reg; Polyurethane Insulation</li><li>Steel</li></ol><p>The exterior features a moisture-resistant composite overlay, molded from real wood pieces to mimic the look and grain of genuine wood. Unlike real wood, the composite won&rsquo;t warp, crack, or rot, even in tough weather conditions.</p><p>The hot-dipped galvanized steel is finished with a durable, baked-on primer and topcoat to guard against rust and fading. For safety, every door includes pinch-resistant sections and strong safety brackets as standard features.</p>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Canyon Ridge Carriage House (4-Layer)","DisplayIndex":4,"ImageGallery":"https://www.clopaydoor.com/image-gallery/canyon-ridge-4-layer","ColorDisclaimer":"<p>You can personalize your Canyon Ridge&reg; Carriage House (4-Layer) door with a wide range of color and finish options to match your home&rsquo;s unique style. Classic <a href=\"https://www.clopaydoor.com/residential/buyingguide/ultra-grain\">Ultra-Grain&reg; finishes</a> like Medium, Walnut, and Slate capture the warmth and depth of natural wood, perfect for adding elegance and character. For a more contemporary or bold look, select from Black, White, Bronze, or Charcoal finishes&mdash;these are exclusive to the Mahogany overlay for an upscale, dramatic effect.</p><p>If you want to create something truly unique, try the two-tone option: choose one color for the steel base and another for the composite overlay, adding extra dimension and personality to your door. Prefer a blank canvas? Opt for the primed finish, ready for your custom paint. And with the <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">ColorBlast&reg; program</a>, you get access to over 1,500 custom colors, ensuring your garage door will be a perfect match.</p><p><em>*Available on select models.</em><br /><em>Black, white, bronze and charcoal only available in Mahogany.</em><br /><em>Two-tone option available. One color for the base layer (steel) and one color for the top layer (composite overlay).</em><br /><em>Custom color available through ColorBlast&reg; program.</em></p>","TopSectionDisclaimer":"<p>With the Canyon Ridge® Carriage House (4-Layer) door, you can tailor the top section to match your style and your home’s architecture. If you prefer a classic, understated look, choose from several solid top designs—either straight or arched—to keep things simple and refined. For those who want to let in more light or add a decorative touch, there’s a wide selection of window options: choose from rectangular, square, or arched windows in various grid patterns. Double doors get even more design flexibility, with special double-arched and multi-window configurations that make a big visual statement.</p>","HardwareDisclaimer":"<p>Complete the look of your Canyon\r\n    Ridge&reg; Carriage House (4-Layer) door with a range of <a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-styles/garage-doors-for-modern-style-homes/hardware\">stylish hardware options</a>\r\n that blend authentic carriage house character with everyday convenience. Every\r\n    door comes standard with spade lift handles, but you can upgrade to spear or colonial\r\n    Lift Handles if you want a different look. For extra flair, add decorative\r\n    handles, ring door knockers, or escutcheon plates&mdash;all designed to give your\r\n    door a custom, handcrafted feel.\r\n</p><p>Step plates and strap\r\n    hinges are available in spade, spear, or colonial styles, so you can match your\r\n    hardware to your handle choice and create a cohesive look. Made from durable\r\n    materials and finished to resist the elements, the hardware adds practical\r\n    function and lasting appeal, making your garage door easy to use and impossible\r\n    to ignore.\r\n</p>","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr5l-des11-rec13-tampa-showcase.webp?sfvrsn=d9bffbb6_1","Id":"30","Url":"https://www.clopaydoor.com/canyonridge","DisplayIndex":3,"ShortDescription":"Insulated carriage house garage doors with faux wood composite cladding and overlays","AlternativeText":"Canyon Ridge Carriage House (5-Layer)"},{"Title":"Gallery<sup class='symbolstxt'>®</sup> Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","Id":"12","Url":"https://www.clopaydoor.com/gallerysteel","DisplayIndex":8,"ShortDescription":"Grooved panel steel carriage house garage doors","AlternativeText":"Gallery Steel"},{"Title":"Coachman<sup class='symbolstxt'>®</sup>","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/coachman-d21-rec13-davidson-595.webp?sfvrsn=d3817fcc_10","Id":"11","Url":"https://www.clopaydoor.com/coachman","DisplayIndex":12,"ShortDescription":"The perfect blend of beauty and practicality, these doors are crafted of durable steel and insulation topped with a textured composite overlay","AlternativeText":"Coachman"},{"Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Custom","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve t-source/product-images/specialty-glass/seeded-gray-glass.webp?sfvrsn=95fc5802_2","DisplayIndex":1,"AlternativeText":"Seeded"},{"Title":"Rain","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/rain-gray-glass.webp?sfvrsn=7d7ca980_2","DisplayIndex":2,"AlternativeText":"Rain"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"}],"SpecsModels":[],"TrackJambModels":[]},"30":{"ProductId":"30","Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ShortDescription":"Insulated carriage house garage doors with faux wood composite cladding and overlays","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr5l-des11-rec13-tampa-showcase.webp?sfvrsn=d9bffbb6_1","CanonicalUrl":"https://www.clopaydoor.com/canyonridge","Overview":"<div class=\"d-flex mt-3 mt-lg-4\" data-section-id=\"Durable Construction\"><h3>Built to Impress, Engineered to Last</h3></div><div class=\"d-flex mt-3 mt-lg-4\" data-section-id=\"Layer\"><h4>5-Layer Strength</h4></div><p>Durable steel base, high-performance insulation, and another layer of steel, all topped with moisture-resistant composite cladding and overlays for serious staying power.</p><h4>Authentic Wood Appearance</h4><p>Composite materials are molded from real wood boards, capturing the look and feel of premium hardwoods like Clear Cypress or Mahogany without the high maintenance.</p><h4>Customized to Fit Your Style</h4><p>Pick from 15 classic carriage house designs, optional windows, and decorative hardware. Choose from 10 standard paint or stain finishes or get creative with over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> custom shades.</p><h4>Superior Comfort &amp; Efficiency</h4><p>The 2\" <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane insulation</a> keeps your garage comfortable year-round, with an impressive R-value of 20.4.</p><h4>Tough in Any Weather</h4><p>Optional <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> is available for extra strength in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay\r\n    doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>Engineered for Strength and Lasting Beauty</h3><p>The Canyon Ridge&reg; Carriage House (5-Layer) is designed to give you the authentic look of wood and the rugged durability of steel. Each door starts with a heavy-duty steel base, layered with advanced Intellicore&reg; polyurethane insulation for maximum energy efficiency and a quieter garage. On top of that, you&rsquo;ll find another layer of steel for extra strength, then moisture-resistant composite cladding and overlays that capture the rich detail of real wood without the worry of warping, rotting, or splitting.</p><p>All hardware is built to last, with rust-resistant components and reinforced safety brackets for added peace of mind. The door&rsquo;s finish stands up to the elements and needs only occasional cleaning&mdash;no sanding, staining, or painting required. Every detail is designed for low maintenance, long-term performance, and reliable safety, so you can focus on enjoying your home&rsquo;s curb appeal instead of worrying about upkeep.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-canyon-ridge-ch-5l.webp?sfvrsn=ba04eee_5\" alt=\"Canyon Ridge 5-Layer Cutaway\" sf-size=\"100\" /><p>&nbsp;</p><ol><li>Composite Overlay</li><li>Composite Cladding</li><li>Steel</li><li>2\" Intellicore&reg; Polyurethane Insulation</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Canyon Ridge Carriage House (5-Layer)","DisplayIndex":3,"ImageGallery":"https://www.clopaydoor.com/image-gallery/canyon-ridge-5-layer","ColorDisclaimer":"<p>Your Canyon Ridge&reg; Carriage House (5-Layer) door comes in a wide palette of finishes designed to showcase its wood-look beauty. Choose from timeless stains like Natural, Medium, Dark, Walnut, Slate, or Espresso for a classic, elegant appearance that highlights the grain and texture of the faux wood.</p><p>For something bolder with a contemporary edge, select models are available in Black, White, Bronze, or Charcoal. These colors are exclusive to Mahogany overlays, adding depth and drama to your garage.</p><p>For even more personality, try the two-tone option: pick one color for the steel base and another for the composite overlay to create a truly custom look. And if you have a specific shade in mind, the Color Blast&reg; program offers over 1,500 custom colors, so your door can perfectly match your home.</p><p><em>*Available on select models.<br />Black, white, bronze and charcoal only available in Mahogany.<br />Two-tone option available. One color for the base layer (steel) and one color for the top layer (composite overlay).<br /></em></p>","TopSectionDisclaimer":"<p>Canyon Ridge&reg; Carriage House (5-Layer) doors offer a wide range of window and top section options, so you can tailor the look to your style. Prefer a simple, solid top for a sleek finish? Choose from several solid panel designs, including traditional rectangular and graceful arched shapes.</p><p>If you want to add natural light and character, there&rsquo;s a whole lineup of window configurations including rectangular, square, and arch-topped styles, with or without decorative grilles. For double doors, special double-arched and wide window arrangements create a balanced, eye-catching appearance.</p>","HardwareDisclaimer":"<p>Every Canyon Ridge® Carriage House (5-Layer) door comes with spade lift handles as standard, bringing a hint of classic carriage house charm. Want to personalize your look? There’s a full collection of optional hardware, including spear and colonial lift handles, decorative styles, and even ring door knockers for a truly vintage vibe.</p>\r\n<p>Step plates and strap hinges are available in matching spade, spear, or colonial shapes, letting you coordinate every detail. All hardware pieces are crafted from weather-resistant materials and finished in classic black, so they stand up to the elements while adding bold contrast and character.</p>\r\n","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (4-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr4l-d21-rec13-afp143r.webp?sfvrsn=8ae1d536_3","Id":"29","Url":"https://www.clopaydoor.com/canyon-ridge-4-layer","DisplayIndex":4,"ShortDescription":"Stylish, low maintenance and insulated faux wood garage doors","AlternativeText":"Canyon Ridge Carriage House (4-Layer)"},{"Title":"Gallery<sup class='symbolstxt'>®</sup> Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","Id":"12","Url":"https://www.clopaydoor.com/gallerysteel","DisplayIndex":8,"ShortDescription":"Grooved panel steel carriage house garage doors","AlternativeText":"Gallery Steel"},{"Title":"Coachm s-clear-efx.webp?sfvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Seeded","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/seeded-gray-glass.webp?sfvrsn=95fc5802_2","DisplayIndex":1,"AlternativeText":"Seeded"},{"Title":"Rain","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/rain-gray-glass.webp?sfvrsn=7d7ca980_2","DisplayIndex":2,"AlternativeText":"Rain"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"}],"SpecsModels":[],"TrackJambModels":[]},"170":{"ProductId":"170","Title":"Modern Steel™","ShortDescription":"Subtle modern beauty, simple up-keep","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/modern-steel-flush_fullview-window-black-garage-door-595.webp?sfvrsn=db7014e9_14","CanonicalUrl":"https://www.clopaydoor.com/modern-steel-collection","Overview":"<h3>A Garage Door with Modern Flair</h3><h4>Flexible Construction</h4><p>Available in 1, 2, or 3-layer options, so you can pick the right balance of durability and insulation for your home.</p><h4>Premium Materials</h4><p>Built with tough steel panels and <a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-materials/insulation\">your choice of insulation</a> for lasting strength and a quiet, solid feel every time you open the door.</p><h4>Sleek Custom Finishes</h4><p>Personalize your look with flush or grooved panels, dozens of paint colors, and rich <a href=\"https://www.clopaydoor.com/residential/buyingguide/ultra-grain\">Ultra-Grain&reg;</a> or <a href=\"https://www.clopaydoor.com/modern-steel-plank\">Ultra-Grain Plank</a> wood-look finishes. Go bold with Lustra&trade; matte for a true modern look.</p><h4>Window Options</h4><p>Add a touch of light your way&mdash;choose from short, long, or slim contemporary windows, stacked vertically or arranged just how you like.</p><h4>Superior Insulation</h4><p>Insulation choices include energy-efficient <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane</a> or polystyrene, with R-values up to 18.4 for comfort and savings in any climate.</p><h4>Weather-Ready</h4><p><a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> is available for homes in high-wind areas, giving you extra peace of mind.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It's Made: Modern Steel&trade;</h3><p>Every Modern Steel&trade; garage door is engineered to deliver years of performance with minimal maintenance. The door&rsquo;s multi-layer steel construction comes in your choice of 1, 2, or 3-layer builds, so you can find the right fit for your needs and budget. Choose from Intellicore&reg; polyurethane or classic polystyrene insulation. Both options boost energy efficiency, make the door feel sturdy and solid, and help keep your garage quieter.</p><p>Durability is built right in. The steel panels are protected by a multi-layer rust-prevention system: hot-dipped galvanizing, metal oxide pretreatment, and a baked-on primer and topcoat all work together to keep the door looking great, year after year. A replaceable vinyl bottom seal in a rust-resistant aluminum retainer blocks out drafts and water, while Clopay&rsquo;s patented Safe-T-Bracket&reg; adds peace of mind with a unique safety design.</p><p>Standard features like heavy-duty 14-gauge steel hinges, smooth 10-ball nylon rollers, and removable window grilles make maintenance easy and performance reliable. Modern Steel&trade; doors also meet strict air infiltration standards, so you get comfort and efficiency without compromise.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-modern-steel.webp?sfvrsn=1a62bdd8_3\" alt=\"Modern Steel\" sf-size=\"100\" /><ol><li>Steel</li><li>Intellicore&reg; Polyurethane or Polystyrene Insulation</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Modern Steel","DisplayIndex":7,"ImageGallery":"https://www.clopaydoor.com/image-gallery/modern-steel","ColorDisclaimer":"<p>Modern Steel&trade; garage doors come in a wide palette of colors and finishes. Classic choices like Standard White, Almond, Sandtone, Chocolate, and Desert Tan work beautifully with almost any exterior. For a more distinctive look, try deeper hues like Bronze, Mocha Brown, Hunter Green, or Charcoal.</p><p>There are also premium finishes like Black and Iron Ore that can bring a vivid contrast to any exterior. For something really different, try one of the Lustra&trade; matte options (Black, Charcoal, Silver) for an unexpected, textured look. If you love the warmth of wood but want easy maintenance, Ultra-Grain&reg; and <a href=\"https://www.clopaydoor.com/modern-steel-plank\">Ultra-Grain Plank</a> finishes offer the authentic look of cypress, walnut, cherry, barnwood, cedar, and more, each with realistic grain detail.</p><p>With so many standard and premium options&mdash;including custom Color Blast&reg; shades by request&mdash;you won&rsquo;t have any trouble finding the right color for your Modern Steel&trade; garage door.</p><p><em>*Available on select models.<br />&plusmn; Matte paint finish has a subtle texture.<br />**Promotion valid on new door purchases in the Iron Ore color; savings vary by door size and location.</em></p>","TopSectionDisclaimer":"<p>Your garage door&rsquo;s windows can completely change the look and feel of your home. Go sleek and modern with slim windows, available in bold black or subtle silver. For a timeless look, explore our decorative insert series, featuring designs like Colonial, Charleston, Madison, Prairie, and Stockton.</p><p>The Architectural Series offers windows with long or short squares or rectangles, with or without grilles, along with various arches and even wrought iron-inspired details. You can choose a window shape, size, and pattern to make the door exactly what you want. No matter your preference, there&rsquo;s a window style here to make your garage door stand out.</p><p><em>*Acrylic window designs.<br />**Sunset windows not available on <a href=\"https://www.clopaydoor.com/residential/buyingguide/ultra-grain\">Ultra-Grain</a> doors.<br />***Contemporary Slim windows available on 2\" thick models only.</em></p>","HardwareDisclaimer":"","DesignDisclaimer":"<p>*Only available with Architectural Series Windows.<br />Learn more about our Ultra-Grain Plank finish options <a href=\"https://www.clopaydoor.com/modern-steel-plank\">here</a>.<br />Depending on door height, exact door appearance and number of sections may be different than illustrations above. <a href=\"http://clopaypdfs.com/pdf_files/RSDR-RESISTACKGUIDE-20.pdf\" target=\"_blank\" data-sf-ec-immutable=\"\">Click here</a> for complete details.</p>","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Modern","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/canyon-ridge-modern-roulette-medium-clear-cypress-showcase.webp?sfvrsn=890cb293_1" up> Louver","ShortDescription":"Versatile and unique, plantation style Louver doors","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/orlandotnahlouvershowcase.webp?sfvrsn=e83ed7a2_1","CanonicalUrl":"https://www.clopaydoor.com/canyon-ridge-louver","Overview":"<h3>Built for Coastal Charm and Lasting Strength</h3><h4>Robust 5-Layer Construction</h4><p>The Canyon Ridge&reg; Louver features a steel core, high-performance insulation, and a second steel layer, all wrapped in a moisture-resistant composite cladding and overlay for extra durability and a gorgeous finish.</p><h4>Authentic Wood Appeal</h4><p>The faux wood composite is molded from real wood pieces, capturing the texture and grain of Clear Cypress or Mahogany&mdash;so you get the warmth of wood without the maintenance.</p><h4>Customizable Design</h4><p>Choose from twelve unique louvered door designs, optional windows, and decorative hardware. Available in eight standard finishes or personalize even further with over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> custom colors.</p><h4>Superior Insulation</h4><p>Each door packs 2\" of <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane foam insulation</a>, delivering R-values from 18.4 to 20.4 for year-round comfort and energy savings.</p><h4>Weather-Resistant Options</h4><p>For homes in high-wind zones, <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> is available for extra peace of mind.</p><h4><strong>Environmental Assurance</strong></h4><p>Clopay\r\n doors are compliant with environmental laws and regulations. Clopay\r\n    doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>Where Craftsmanship Meets Innovation</h3><p>The Canyon Ridge&reg; Louver garage door is built with five thoughtfully engineered layers that combine the best of beauty and brawn. At its core, you&rsquo;ll find a heavy-duty steel base for strength and structure. This is surrounded by thick, 2-inch Intellicore&reg; polyurethane insulation, which not only boosts the door&rsquo;s energy efficiency, but also helps keep your garage quieter and more comfortable year-round. Another steel layer adds extra durability, while the exterior is finished with a composite cladding and overlay that mimic the look and feel of real wood without the worries of warping, rotting, or cracking.</p><p>Maintenance is simple: the composite materials are moisture-resistant and built to handle everything from coastal humidity to harsh winters. The multi-layer steel skin is protected by Clopay&rsquo;s advanced rust-prevention system, including hot-dipped galvanizing, a protective metal oxide coating, and a tough, baked-on finish. Every door comes with a replaceable vinyl bottom weather seal in a rust-resistant aluminum retainer to keep the elements out, and a patented Safe-T-Bracket&reg; to help prevent injuries during maintenance. This is a door designed for everyday ease, lasting curb appeal, and dependable performance.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-canyon-ridge-louver320.webp?sfvrsn=e30813be_4\" alt=\"\" sf-size=\"28612\" /><p>&nbsp;</p><ol><li>Composite Overlay</li><li>Composite Cladding</li><li>Steel</li><li>2\" Intellicore&reg; Polyurethane Insulation</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Canyon Ridge Louver","DisplayIndex":5,"ImageGallery":"https://www.clopaydoor.com/image-gallery/canyon-ridge-louver","ColorDisclaimer":"<p>The Canyon Ridge&reg; Louver garage door comes in a variety of finishes designed to enhance its natural woodgrain texture and complement your home&rsquo;s exterior. Choose from classic wood-inspired stains like Medium, Dark, Walnut, and Slate for a warm, inviting look. For a more modern edge, there are also Black, White, Bronze, and Charcoal finishes, which are available on select models and exclusively in the Mahogany composite.</p><p>If you want something truly unique, the door&rsquo;s two-tone option lets you mix colors between the steel base layer and the composite overlay, giving you even more control over your door&rsquo;s style. Plus, the Color Blast&reg; program offers over 1,500 custom paint colors, so you can find the perfect shade to match your vision.</p><p><em>*Available on select models.<br />Black, white, bronze and charcoal only available in Mahogany.<br />Steel surfaces have a woodgrain texture.<br />Two-tone option available. One color for the base layer (steel) and one color for the top layer (composite overlay).</em></p>","TopSectionDisclaimer":"<p>Available only on Design 52, the Canyon Ridge&reg; Louver garage door offers several top section window designs so you can personalize your door&rsquo;s look and let in just the right amount of natural light. The lineup includes rectangular and square window configurations like REC11, REC13, REC14, SQ23, and SQ24. You can get a wide, open feel with larger windows or a more classic, balanced look with smaller panes, whatever suits your style.</p><p>These top section options help you control the look&mdash;from clean-lined and modern to traditional and welcoming&mdash;while also allowing you to brighten your garage&rsquo;s interior. No matter which window layout you choose, each one is designed to complement the louvered panels and enhance your home&rsquo;s curb appeal.</p>","HardwareDisclaimer":"<p>The Canyon Ridge&reg; Louver offers a range of hardware choices to add both style and function to your garage door. Every door comes standard with durable spade lift handles, which provide a classic look and easy grip. If you want to elevate your door&rsquo;s aesthetic, upgrade to optional handle styles like spear, colonial, decorative lift handles, or even a ring door knocker for added charm.</p><p>To complement these handles, you can also choose from a variety of escutcheon plates and twisted &ldquo;L&rdquo; handles, adding subtle but distinctive details that enhance your door&rsquo;s overall appeal.</p><p>For hinges, there&rsquo;s a selection of styles including spade, spear, and colonial strap hinges, all designed to match your chosen hardware and reinforce the door&rsquo;s structure. These decorative and functional hardware pieces let you tailor your Canyon Ridge&reg; Louver door to fit your home&rsquo;s architectural style perfectly.</p>","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (4-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr4l-d21-rec13-afp143r.webp?sfvrsn=8ae1d536_3","Id":"29","Url":"https://www.clopaydoor.com/canyon-ridge-4-layer","DisplayIndex":4,"ShortDescription":"Stylish, low maintenance and insulated faux wood garage doors","AlternativeText":"Canyon Ridge Carriage House (4-Layer)"},{"Title":"Gallery<sup class='symbolstxt'>®</sup> Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","Id":"12","Url":"https://www.clopaydoor.com/gallerysteel","DisplayIndex":8,"ShortDescription":"Grooved panel steel carriage house garage doors","AlternativeText":"Gallery Steel"},{"Title":"Coachman<sup class='symbolstxt'>®</sup>","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/coachman-d21-rec13-davidson-595.webp?sfvrsn=d3817 mages/default-source/product-images/product-designs/canyonridgelouver/crlv-design45-slate-mh.webp?sfvrsn=b73e401d_2","Description":"Canyon Ridge Design 45","AlternativeText":"Design 45"},{"Title":"Design 55","GroupName":"Series 5","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/canyonridgelouver/crlv-design55-slate-mh.webp?sfvrsn=f9698ea1_2","Description":"CANYON RIDGE LOUVER DESIGN 55","AlternativeText":"Design 55"},{"Title":"Design 46","GroupName":"Series 4","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/canyonridgelouver/crlv-design46-slate-mh.webp?sfvrsn=bccc696c_2","Description":"Canyon Ridge Louver Design 46","AlternativeText":"Design 46"},{"Title":"Design 47","GroupName":"Series 4","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/canyonridgelouver/crlv-design47-slate-mh.webp?sfvrsn=78481115_2","Description":"Canyon Ridge Louver Design 47","AlternativeText":"Design 47"}],"MaterialOptions":[{"Title":"Louver Mahogany","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/cladding-mahogany164.webp?sfvrsn=e9a09dfc_2","AlternativeText":"Mahogany Cladding","DisplayIndex":1,"GroupName":"Composite Cladding/Base Materials","GroupIndex":1},{"Title":"Ultra-Grain® Finish Clear Cypress or Solid Color Steel","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/cladding-clear-cypress-solid-steel164.webp?sfvrsn=9860312d_2","AlternativeText":"Material Option","DisplayIndex":1,"GroupName":"Composite Cladding/Base Materials","GroupIndex":1},{"Title":"Mahogany","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/hardware/overlay-mahoganycrl164.webp?sfvrsn=d43a8e21_1","AlternativeText":"Mahogany Overlay","DisplayIndex":1,"GroupName":"Composite Overlay Materials","GroupIndex":2},{"Title":"Clear Cypress","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/overlay-clear-cypresscrl164.webp?sfvrsn=e481a012_2","AlternativeText":"Clear Cypress Overlay","DisplayIndex":2,"GroupName":"Composite Overlay Materials","GroupIndex":2}],"SpecialityGlassOptions":[],"SpecsModels":[],"TrackJambModels":[]},"250":{"ProductId":"250","Title":"Bridgeport™ Steel","ShortDescription":"Timeless recessed panel style in durable, modern steel","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/bridgeport-595.webp?sfvrsn=22fc6bb4_12","CanonicalUrl":"https://www.clopaydoor.com/bridgeport","Overview":"<h3>Traditional, Timeless, and Built to Last</h3><h4>Flexible Construction Options</h4><p>Choose from 3-layer, 2-layer, or single-layer doors to match your needs for insulation, strength, and budget.</p><h4>Built Tough</h4><p>Durable steel construction stands up to daily use, while insulated options keep noise and weather where they belong&mdash;outside.</p><h4>Endless Style Choices</h4><p>Pick between wide or narrow recessed panels, with optional windows for extra light. Finish your door with 16 color options, including realistic <a href=\"https://www.clopaydoor.com/residential/buyingguide/ultra-grain\">Ultra-Grain&reg;</a> wood-look finishes, modern Lustra matte, or one of 1,500+ <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> custom paint colors.</p><h4>Cozy and Efficient</h4><p>Insulation choices include <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane</a> (up to 2\" thick) or energy-saving polystyrene, with R-values ranging from 6.3 to 18.4 to keep your garage comfortable in any season.</p><h4>Weather-Ready</h4><p>Add <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> for extra protection in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Bridgeport&trade; Steel</h3><p>The Bridgeport&trade; Steel garage door is built with your home&rsquo;s comfort and durability in mind. Choose from 1-, 2-, or 3-layer construction, each featuring heavy-duty steel inside and out. For extra comfort, select <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane insulation</a>, Clopay&rsquo;s proprietary foam that fills every inch of the door for maximum strength, warmth, and quiet operation. Or if you want something simpler, <a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-materials/insulation\">polystyrene insulation</a> is also available for reliable energy efficiency.</p><p>Every panel is finished with a multi-layer rust-resistant system: hot-dipped galvanizing, a protective metal oxide pretreatment, and a baked-on primer and topcoat. This means your door stands up to rain, snow, and sun, year after year, with nominal upkeep.</p><p>Other features include a replaceable vinyl bottom seal to block drafts, patented Safe-T-Bracket&reg; hardware for added safety, and removable window grilles for easy cleaning. All doors insulated with Intellicore&reg; come standard with smooth-gliding nylon rollers and heavy-duty steel hinges for lasting performance.</p><p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-bridgeport-steel.webp?sfvrsn=84e68a46_7\" alt=\"Bridgeport Steel\" sf-size=\"5598\" /></p><ol><li>Steel</li><li>Intellicore&reg; Polyurethane or Polystyrene Insulation</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Bridgeport Steel","DisplayIndex":11,"ImageGallery":"https://www.clopaydoor.com/image-gallery/bridgeport-steel","ColorDisclaimer":"<p><strong><em></em></strong>From classic neutrals to bold statement shades, Bridgeport&trade; Steel offers a large color palette. Stick with standard White, Almond, Desert Tan, Sandtone, Bronze, Chocolate, Mocha Brown, or Charcoal, each with subtle woodgrain texture for a warm, natural appearance. Or explore premium finishes like deep Black or the richly grained Ultra-Grain&reg; Oak, available in Medium, Dark, Slate, and Walnut, with select options in low gloss for a modern twist.</p><p>If you want something more contemporary, the Lustra&trade; collection brings noteworthy matte finishes in Charcoal, Black, and Silver, or try Iron Ore for a refined look. And if you want a shade that&rsquo;s uniquely yours, the <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> program lets you choose from over 1,500 custom colors.</p><p>Keep in mind: some premium and matte finishes are available only on select door models, so check which colors fit your design.</p><p>(S) Stucco Texture<br />(W) Woodgrain Texture<br />(M) Matte Texture</p><p><em>*Not available on Bridgeport Steel 1- and 2-Layer doors<br />&plusmn;Only available on Bridgeport Steel 1- and 2-layer doors<br />Premium Colors are subject to additional fee and only available on 24-gauge steel.<br />**Promotion valid on new door purchases in the Iron Ore color; savings vary by door size and location.</em></p>","TopSectionDisclaimer":"<p>Bridgeport&trade; Steel doors are available with a solid top section or you can personalize your door with a variety of window options. Choose from simple rectangular or square windows, elegant arched designs, or even add a touch of drama with decorative wrought iron styles (available in durable acrylic).</p><p>If you want a bit more privacy, you can select from plain glass or grilles in several patterns, including vertical and horizontal styles. Double car doors have exclusive &ldquo;double top&rdquo; section designs for even more curb appeal. No matter your pick, every window option is designed to complement your door&rsquo;s proportions and elevate your home&rsquo;s exterior. So, you can let the light in, show off your style, or both.</p><p><em>*Acrylic window designs.<br />Note for Double Top Sections: These are specific to double car doors, in addition to options above.</em></p>","HardwareDisclaimer":"<p>Complete your Bridgeport&trade; Steel door with hardware that&rsquo;s as sturdy as it is stylish. Every door comes standard with color-matched lift handles, blending seamlessly into your chosen finish for a polished look. But if you want to add a little extra flair, there&rsquo;s a range of decorative handle and hinge styles&mdash;spade, spear, or colonial&mdash;for you to consider.</p><p>Optional hardware is crafted from durable materials and finished to coordinate with your door, so everything feels cohesive and built to last. Add matching step plates for easy operation and an extra touch of detail. For a more distinctive look, upgrade to twisted &ldquo;T&rdquo; or &ldquo;L&rdquo; handles or select escutcheon plates for a refined finish.</p><p>These hardware options add curb appeal and bring out the best in your Bridgeport&trade; design, letting you personalize your garage door right down to the last detail.</p>","DesignDisclaimer":"<p>Depending on door height, exact door appearance and number of sections may be different than illustrations above.&nbsp;<a href=\"http://clopaypdfs.com/pdf_files/RSDR-RESISTACKGUIDE-20.pdf\" target=\"_blank\" data-sf-ec-immutable=\"\">Click here</a>&nbsp;for complete details.</p><p>18\" sections not availa Finishes</h4><p>Pick from classic anodized or painted finishes, go bold with powder-coat colors, or match your home perfectly with over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> options.</p><h4>Insulated for Comfort</h4><p>Select models include <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane insulation</a> and insulated glass to help keep your garage more comfortable, year-round.</p><h4>Wind-Ready Protection</h4><p>Ask about our <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> to meet code in high-wind areas.</p><h4>C-Power&trade; Technology</h4><p>Our <a href=\"https://www.clopaydoor.com/c-power-technology\">Click-to-Conceal&trade; panels</a> can instantly transition from transparent to opaque with the tap of a remote, providing on-demand visual privacy without sacrificing the door&rsquo;s architectural aesthetic.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul type=\"disc\"><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li><li>Meets ASHRAE&reg; 90.1 Title 24 and IECC&reg; (International Energy Conservation Code) 2021 Section C406.9 Air Infiltration requirements.</li></ul>","Options":"","Construction":"<h3>Solid Construction for Everyday Confidence</h3><p>The Avante&reg; Sleek garage door is built to look great and stand the test of time. Its frame is made from commercial-grade aluminum, so it&rsquo;s naturally rust-resistant and practically maintenance-free&mdash;just an occasional rinse keeps it looking fresh.</p><p>For added comfort, select models feature Intellicore&reg; polyurethane insulation in the rails and stiles, helping keep your garage quieter and more comfortable. Every panel is joined with a weather-sealing section joint, so rain and wind stay outside where they belong. Also, an integral reinforcing fin adds extra strength and stability on wider doors.</p><p>You can choose from a wide variety of glass or acrylic panel options to get the perfect combination of light, privacy, and style for your home.</p><div class=\"options-container\"><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-avanteax-1l-non-tg.webp?sfvrsn=621b921_1\" alt=\"Avante Construction\" sf-size=\"3022\" /><div>Model AZ6 made of 2-1/8&rdquo; durable commercial grade aluminum, making it virtually maintenance-free and long-lasting</div></div><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-avanteaxu.webp?sfvrsn=b2614212_1\" alt=\"Avante Construction\" sf-size=\"2816\" /><div>Model AZ6U made of 2-1/8\" durable commercial grade aluminum with <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg;</a> polyurethane insulation with an R-value of 3.8 (with clear insulated glass)</div></div><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/avante-ax-section-jointafbb6bf6-aae4-46fe-bfd2-9d85bb40efc2.webp?sfvrsn=7123d472_2\" alt=\"Section Joint\" sf-size=\"4196\" /><div>Integral section joint seal for further reduction of air and water infiltration</div></div><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/avante-ax-frame-detail.webp?sfvrsn=c8ced87e_1\" alt=\"Avante Construction\" sf-size=\"1506\" /><div>Smooth flat frame edge design for a more contemporary look</div></div><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/avante-ax-section-joint01.webp?sfvrsn=ba3d07b5_1\" alt=\"Section Joint\" sf-size=\"5242\" /><div>Reinforcing fin included on doors wider than 14&rsquo;. Standard doors 12&rsquo; and under do not use built-in reinforcing fin. Usage on widths 12&rsquo;2&rdquo; to 14&rsquo; depend upon glass weight. WindCode&reg; doors may vary.</div></div><div class=\"commerical-image-fixed-width-large\"><div><strong></strong>For Avante&reg; Sleek doors equipped with our innovative and new <a href=\"https://www.clopaydoor.com/c-power-technology\">C-Power&trade; Technology</a>, all wiring is concealed within the door sections for a clean appearance and simple installation.</div></div></div><h2 class=\"h3\">Additional Features</h2><ul><li>Replaceable vinyl bottom weather seal in a rust-resistant aluminum retainer helps keep out air and water.</li><li>Integral section joint seal helps keep out air and water. </li><li>Built-in reinforcing fin provides increased strength and longevity. Included on doors wider than 14&rsquo;. Standard doors 12&rsquo; and under do not use a reinforcing fin. Usage on doors 12&rsquo;2&rdquo; to 14&rsquo; wide depends upon glass weight. <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg;</a> doors may vary.</li><li>A patented Safe-T-Bracket&reg; prevents serious injury that could occur if the bottom bracket were removed with the garage door closed and under tension</li><li>All <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg;</a> insulated doors come standard with 10-ball nylon rollers and heavy-duty 14-gauge steel hinges.</li></ul>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Avante Sleek","DisplayIndex":10,"ImageGallery":"https://www.clopaydoor.com/image-gallery/avante-sleek","ColorDisclaimer":"<p>The Avante&reg; Sleek lets you choose a finish that fits your style, whether you want something classic or bold. Go for the clean, modern look of Clear Aluminum (anodized), Standard White, rich Chocolate, or one of several shades of Bronze and Black, available in both anodized and painted finishes. If you love the look of bronze but want a consistent color throughout, the Bronze (painted) option is your best bet.</p><p>You can also customize your door with Clopay&rsquo;s Color Blast&reg; paint system or RAL powder coat finishes&mdash;over 1,500 colors available. These finishes are designed to stand up to the elements and keep your door looking sharp for years.</p><p><em>Note: Due to the anodizing process, color variation may occur. The use of Bronze (Painted)&rdquo; is recommended for a more consistent bronze finish\r\n        color. Custom colors available.</em></p>","TopSectionDisclaimer":"","HardwareDisclaimer":"<p>The Avante&reg; Sleek keeps\r\n    things streamlined, right down to the hardware. Every door comes with the\r\n    option to add sleek, color-matched aluminum grip handles that blend perfectly\r\n    with your chosen frame color. These handles are built for comfort and easy use,\r\n    making it simple to open and close your door every day.<o:p></o:p></p>","DesignDisclaimer":"<p><em>*Only available on doors equipped with C-Power&reg; technology. Glass available in insulated tempered or laminated.</em></p><p>Please note hardcoated options are available.<strong></strong></p>","RelatedProducts":[{"Title":"Modern Steel™","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/modern-steel-flush_fullview-window-black-garage-door-595.webp?sfvrsn=db7014e9_14","Id":"170","Url":"https://www.clopaydoor.com/modern-steel-collection","DisplayIndex":7,"ShortDescription":"Subtle modern beauty, simple up-keep","AlternativeText":"Modern Steel"},{"Title":"Av lay and base, a polystyrene-insulated Hemlock frame, and a 2\" Luan backer for strength and durability.</p><h4>Eco-Friendly Composite</h4><p>Made from patented, sustainable materials, Extira resists moisture, rot, and termites while delivering the look and feel of genuine wood&mdash;without the flaws.</p><h4>Limitless Design Options</h4><p>Choose smooth or grooved panels, add deep V-grooves, arches, or curves&mdash;details that aren&rsquo;t possible with most garage doors. The surface is knot-free for a flawless, furniture-quality paint finish.</p><h4>Custom Colors &amp; Finishes</h4><p>Select from 1,500+ <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> paint shades to match your style. The paint-grade wood composite ensures a crisp, even finish every time.</p><h4>Energy Efficiency Built In</h4><p><a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-materials/insulation\">Polystyrene insulation</a> (R-value 5.9) keeps your garage more comfortable year-round and helps with energy savings.</p><h4>Built for Any Climate</h4><p>Ask about <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> for extra protection in high-wind areas.</p><h4>Environmental Assurance</h4><p>Extira is a patented and proprietary wood composite manufactured from certified ecofriendly materials.</p><ul><li>Contains wood that has no commercial timber value and is the byproduct of other operations.</li><li>Certified by Scientific Certification Systems under certificate number SCS-MC-01802 to contain no added urea-formaldehyde.</li><li>Acknowledged by the California Air Resources Board&rsquo;s (CARB) Airborne Toxic Control Measure (ATCM) 93120 to use exempt status ultra-low emitting\r\n        formaldehyde (ULEF) resins.</li><li>Contributes to industry green building programs such as LEED and the National Green Building Standard.</li></ul><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>Solid Construction, Worry-Free Living</h3><p>Every Reserve&reg; Wood Extira&reg; garage door is crafted with durability and minimal maintenance in mind. At its core is a solid Hemlock wood frame, chosen for its natural strength and stability. This frame is wrapped and banded to seal out moisture, so your door stands up to the elements year after year.</p><p>A thick Extira&reg; overlay forms the exterior, delivering the look of high-end wood with exceptional resistance to rot, termites, and swelling. Inside, polystyrene insulation keeps your garage more comfortable, while a smooth 1/4\" Luan backer creates a clean, paintable finish for the interior face.</p><p>Special touches&mdash;like three-section construction for larger window openings and a unique one-piece drip cap&mdash;help keep water out and preserve the beauty of the door. True divided windows, premium hardware, and smooth-gliding rollers ensure quiet, reliable operation. A replaceable vinyl weather seal along the bottom keeps out drafts and debris.</p><p>Reserve&reg; Wood Extira&reg; doors arrive primed or painted, ready for installation, and Color Blast doors are backed by a two-year warranty for added confidence.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-reserve-wood-extira.webp?sfvrsn=3d97e7ef_3\" alt=\"Reserve Wood Extira\" sf-size=\"100\" /><ol><li>Cladding</li><li>Extira&reg;</li><li>Polystyrene Insulated Hemlock Frame</li><li>1/4\" Luan Inside Skin</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Reserve Wood Extira","DisplayIndex":14,"ImageGallery":"https://www.clopaydoor.com/image-gallery/reserve-wood-extira","ColorDisclaimer":"<p>Your Reserve&reg; Wood Extira&reg; garage door comes primed and ready for the color of your choice. Thanks to Extira&rsquo;s ultra-smooth surface, each door takes paint beautifully, resulting in a rich, even finish that stands up to weather and wear.</p><p>Choose from hundreds of Sherwin-Williams&reg; paint shades with the Color Blast&reg; program including deep, dramatic hues that are tough to achieve on natural wood. Options range from classic white to a bold black&mdash;there&rsquo;s a color to complement your home and highlight your door&rsquo;s design details.\r\n</p><br />","TopSectionDisclaimer":"<p>Reserve&reg; Wood Extira&reg;\r\n    doors offer a range of window and top section options from classic rectangles\r\n    and squares to elegant arches and sleek modern designs. Go for a traditional\r\n    look with REC or SQ series windows or pick arched tops for a little extra\r\n    charm. For a contemporary look, try modern short, modern long, or the striking modern\r\n    aluminum inlay.\r\n</p><p>Each window style brings\r\n    in natural light while letting you choose the level of privacy and visual\r\n    impact you want. Pair your favorite design with specialty glass or opt for true\r\n    divided lite windows for authentic detail.\r\n</p>","HardwareDisclaimer":"<p>Every Reserve® Wood Extira® garage door comes with sturdy spade lift handles, but you can personalize your door with a variety of handle and hinge designs. Choose from spade, spear, or colonial lift handles, each with its own distinct personality. Want more flair? Optional ring door knockers and escutcheon plates let you add even more character.</p>\r\n<p>Step plates and strap hinges are available in matching styles, giving your door a cohesive, handcrafted look. All hardware is made from premium materials designed to resist weather and everyday wear, so your door keeps looking great and operating smoothly.</p>\r\n","DesignDisclaimer":"<p>*Only available in smooth.</p>","RelatedProducts":[{"Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Custom","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-le-chevron-595.webp?sfvrsn=2b65fc56_8","Id":"8","Url":"https://www.clopaydoor.com/reserve-custom","DisplayIndex":15,"ShortDescription":"Both stunning and substantial, every Reserve® Wood garage door embodies our total commitment to design, detail and craftsmanship","AlternativeText":"Reserve Wood Custom"},{"Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Limited Edition","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-limimted-edition-design5-arch1-meranti-garage-door-595.webp?sfvrsn=d5180ef3_10","Id":"10","Url":"https://www.clopaydoor.com/reserve","DisplayIndex":16,"ShortDescription":"Exceptional beauty, durability and energy efficiency","AlternativeText":"Reserve Wood Limited Edition"},{"Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Modern","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-modern-design-cladding-solid-garage-door-595.webp?sfvrsn=b04b7a7a_9","Id":"25","Url":"https://www.clopaydoor.com/reserve-modern-contemporary-garage-doors","DisplayIndex":17,"ShortDescription":"Clean lines and simple forms invite the beauty of natural wood stand out","AlternativeText":"Reserve Wood Modern"},{"Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Semi-Custom","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-semi-custom-design4-rec14-window-hemlock-garage-door-822.webp?sfvrsn=a767211d_8","Id":"9","Url":"https://www.clopaydoor.com/Reserve-Semi","DisplayIndex":18,"ShortDescription":"Let the lasting beauty of a natural wood door welcome you home","AlternativeText":"Reserve Wood Semi-Cus
