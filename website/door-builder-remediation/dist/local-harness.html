fvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Seeded","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/seeded-gray-glass.webp?sfvrsn=95fc5802_2","DisplayIndex":1,"AlternativeText":"Seeded"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"}],"SpecsModels":[],"TrackJambModels":[]},"320":{"ProductId":"320","Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Chevron","ShortDescription":"Insulated faux wood garage doors with a classic chevron design","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/chevron.webp?sfvrsn=823f979a_21","CanonicalUrl":"https://www.clopaydoor.com/canyon-ridge-chevron","Overview":"<h3>Chevron Style, Built to Last</h3><h4>Hardy 5-Layer Construction</h4><p>The Canyon Ridge&reg; Chevron door features a tough, five-layer build&mdash;steel, insulation, steel, composite cladding, and a composite overlay&mdash;that delivers lasting strength and a premium finish.</p><h4>Genuine Wood Appeal</h4><p>Get the warmth and character of wood without the upkeep. The faux wood composite cladding and overlays are molded from real wood pieces, so you see every beautiful grain and texture.</p><h4>Signature Chevron Design</h4><p>Each cladding piece is precision-cut at a 45-degree angle, forming the bold chevron &ldquo;V&rdquo; pattern that sets this door apart. With 15 design variations and four unique patterns, you can make a statement that&rsquo;s all your own.</p><h4>Endless Customization</h4><p>Choose from Clear Cypress or Mahogany, available in ten standard finishes or over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; custom paint colors</a>. Add optional windows and decorative hardware for a personalized touch.</p><h4>Superior Insulation</h4><p>2&rdquo; <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane foam</a> delivers an impressive 20.4 R-value, helping keep your garage more comfortable all year.</p><h4>Ready for Any Climate</h4><p>Ask about <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> for extra protection in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>Designed to Catch Your Eye</h3><p>The Canyon Ridge&reg; Chevron garage door is crafted with a 5-layer construction that delivers both durability and standout curb appeal. At its core, a tough steel base provides strength and stability, while 2\" of <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane foam</a> insulation boosts energy efficiency with a remarkable 20.4 R-value, helping to keep your garage quieter and more comfortable.</p><p>On top of the steel, a second layer of steel adds extra resilience. The exterior features composite cladding and overlay, both molded from real wood to capture authentic grain patterns and natural texture. This advanced composite material resists moisture, rot, and cracking, so you get the classic look of wood without the maintenance headaches.</p><p>Corrosion-resistant hot-dipped galvanized steel skins, a baked-on primer, and topcoat ensure lasting protection from the elements. Additional safety features like patented Safe-T-Bracket&reg; and sturdy hardware complete the package, making this door as reliable as it is beautiful.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-canyon-ridge-chevron.webp?sfvrsn=3230860_5\" alt=\"Cutaway\" sf-size=\"6784\" /><ol><li>Composite Overlay</li><li>Composite Cladding</li><li>Steel</li><li>2\" Intellicore&reg; Polyurethane Insulation</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Canyon Ridge Chevron","DisplayIndex":2,"ImageGallery":"https://www.clopaydoor.com/image-gallery/canyon-ridge-chevron","ColorDisclaimer":"<p>The Canyon Ridge&reg; Chevron gives you a wide palette of finishes to perfectly complement your home&rsquo;s style and bring out the unique chevron pattern. Choose from warm, wood-inspired stains like Natural, Medium, Dark, or Walnut for a rich, authentic look that highlights the detailed grain of the composite cladding and overlay.</p><p>For a more contemporary vibe, Slate and Espresso finishes offer cool, sophisticated tones that work beautifully with modern exteriors.</p><p>Looking for something especially striking? Select models in Mahogany offer exclusive colors like Black, White, Bronze, and Charcoal for a bold, distinctive statement. If you&rsquo;re after a unique combination, the two-tone option lets you pick one color for the base steel layer and another for the composite overlay, creating a custom layered effect.</p><p>Prefer to start with a blank slate? Opt for the primed, no-finish door, ready for your own paint or stain. And if you want a truly personal touch, the <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">ColorBlast&reg; program</a> opens up more than 1,500 custom color possibilities&mdash;so you can match your door to virtually any color scheme.</p><p><em>*Available on select models.<br />Black, white, bronze and charcoal only available in Mahogany.<br />Two-tone option available. One color for the base layer (steel) and one color for the top layer (composite overlay).</em></p>","TopSectionDisclaimer":"<p>The Canyon Ridge&reg; Chevron lets you customize the top section of your garage door to match your home&rsquo;s style and your personal taste. Whether you want arches to make it look more like a carriage house door or a row of crisp, square windows for a modern touch, the range of top section options makes it easy to personalize your door.</p><p>Choose from solid, non-window sections for a sleek, uninterrupted chevron look, or add windows for extra light and architectural interest. <a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-windows-guide\">Window configurations</a> include a wide variety of shapes and arrangements, from classic rectangular windows (like REC11, REC13, REC14) to square designs (SQ23, SQ24) and several arched options (ARCH1, ARCH3, ARCH4, ARCH13, ARCH14) for a more traditional or decorative feel. You can opt for single or multi-pane layouts and select from different top section patterns such as TOP11, TOP12, or TOP13, each offering a distinct look.</p>","HardwareDisclaimer":"<p>Personalize your Canyon Ridge&reg; Chevron garage door with a range of hardware choices that blend functionality and style. Each door comes standard with spade lift handles&mdash;a classic, versatile option that suits almost any exterior. For a more customized look, upgrade to spear or colonial lift handles, or choose decorative lift handles to add a unique touch.</p><p>You can enhance your door&rsquo;s character with optional accents like the ring door knocker, escutcheon plates, or twisted \"L\" handles for a rustic, handcrafted feel. Step plates are available in spade, spear, or colonial designs, not only protecting your door but also adding a subtle decorative element.</p><p>Complete the look with matching strap hinges in spade, spear, or colonial styles&mdash;these can be both functional and decorative, giving your door the timeless charm of <a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-styles/carriage-house-garage-doors\">classic carriage house</a> hardware.</p>","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr5l-des11-rec13-tampa-showcase.webp?sfvrsn=d9bffbb6_1","Id":"30","Url":"https://www.clopaydoor.com/canyonridge","DisplayIndex":3,"ShortDescription":"Insulated carriage house garage doors with faux wood composite cladding and overlays","AlternativeText":"Canyon Ridge Carriage House (5-Layer)"},{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (4-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr4l-d21-rec13-afp143r.webp?sfvrsn=8ae1d536_3","Id":"29","Url":"https://www.clopaydoor.com/canyon-ridge-4-layer","DisplayIndex":4,"ShortDescription":"Stylish, low maintenance and insulated faux wood garage doors","AlternativeText":"Canyon Ridge Carriage House (4-Layer)"}],"ProductBrochures":[{"Title":"Canyon Ridge Brochure","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/rsdr-canyonridgebr-20-1.webp?sfvrsn=9c9dfc36_5","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-CANYONRIDGEBR-20.pdf","Extension":"PDF","DisplayIndex":1},{"Title":"Products Available Through Independent Dealers","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/idea-book.webp?sfvrsn=699cfb64_5","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-IMAGINE-14.pdf","Extension":"PDF","DisplayIndex":2}],"ProductInstallationAndCare":[{"Title":"Installation Manual for Residential Sectional Insulated S t-designs/canyonridgechevron/chevron-design-36v.webp?sfvrsn=97603c58_2","Description":"CHVR-Design36","AlternativeText":"Design 36"},{"Title":"Design 37","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/canyonridgechevron/chevron-design-37v.webp?sfvrsn=906fbc5d_2","Description":"CHVR-Design37","AlternativeText":"Design 37"}],"MaterialOptions":[{"Title":"Clear Cypress","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/composite-clear-cypresscr5164.webp?sfvrsn=c018ab11_2","AlternativeText":"Material Option","DisplayIndex":1,"GroupName":"Composite Overlay Materials","GroupIndex":2},{"Title":"Clear Cypress","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/material-clear-cypress164.webp?sfvrsn=22f48aad_2","AlternativeText":"Material Option","DisplayIndex":1,"GroupName":"Composite Cladding Materials","GroupIndex":null},{"Title":"Mahogany","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/composite-mahoganycr5164.webp?sfvrsn=70436ed7_2","AlternativeText":"Mahogany","DisplayIndex":2,"GroupName":"Composite Overlay Materials","GroupIndex":2},{"Title":"Mahogany","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/material-mahogany164.webp?sfvrsn=6a9c1a80_2","AlternativeText":"Mahogany","DisplayIndex":2,"GroupName":"Composite Cladding Materials","GroupIndex":1}],"SpecialityGlassOptions":[{"Title":"Clear","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/glass-clear-efx.webp?sfvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Seeded","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/seeded-gray-glass.webp?sfvrsn=95fc5802_2","DisplayIndex":1,"AlternativeText":"Seeded"},{"Title":"Rain","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/rain-gray-glass.webp?sfvrsn=7d7ca980_2","DisplayIndex":2,"AlternativeText":"Rain"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"}],"SpecsModels":[],"TrackJambModels":[]},"330":{"ProductId":"330","Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Elements","ShortDescription":"Textured overlays paired with clean, square edges and durable insulated steel gives you the look of painted wood without the upkeep","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/crelementsshowcase-emilyhenderson.webp?sfvrsn=a9a42851_1","CanonicalUrl":"https://www.clopaydoor.com/elements","Overview":"<h3>Reliable Performance, Stunning Style</h3><h4>Rugged 4-Layer Construction</h4><p>Built with a tough steel interior and exterior, high-performance insulation, and a composite overlay for a wood-look finish that lasts.</p><h4>Woodgrain Appeal, Zero Hassle</h4><p>The composite overlay is carefully molded with a realistic woodgrain texture, so you get the classic style of painted wood&mdash;without the ongoing maintenance.</p><h4>Make It Yours</h4><p>Pick from 13 different designs, add optional windows or decorative hardware, and choose from 7 standard paint colors&mdash;or over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">custom Color Blast&reg; options</a>.</p><h4>Comfort and Efficiency</h4><p>The 1-3/8&rdquo; polystyrene insulation (R-value 6.5) helps keep your garage comfortable and energy-efficient, no matter the season.</p><h4>Built for Tough Conditions</h4><p>For homes in high-wind areas, <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; door reinforcement</a> is available for extra peace of mind.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>Built for Strength and Lasting Performance</h3><p>Canyon Ridge&reg; Elements garage doors are engineered to handle life&rsquo;s demands, inside and out. Each door starts with a heavy-duty steel base for strength and stability. On top of that is a layer of thick polystyrene insulation which helps to keep your garage quiet, energy-efficient, and comfortable in every season. The exterior gets a second layer of steel, then a moisture-resistant composite overlay that looks just like painted wood, but won&rsquo;t rot, warp or crack.</p><p>To keep your door looking and working its best, the steel skins are finished with a multi-step rust-prevention system: hot-dipped galvanizing, a protective metal oxide treatment, and a baked-on primer and topcoat for long-lasting durability. The bottom of the door features a replaceable vinyl weather seal set in a rust-resistant aluminum retainer to keep out air and water. For peace of mind, the patented Safe-T-Bracket&reg; helps prevent accidental injuries, and removable window grilles make cleaning simple.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-canyon-ridge-elements-4l.webp?sfvrsn=2a15a388_4\" alt=\"Canyon Ridge Elements\" sf-size=\"100\" /><p>&nbsp;</p><ol><li>Composite Overlay</li><li>Steel</li><li>Polystyrene Insulation</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Canyon Ridge Elements","DisplayIndex":1,"ImageGallery":"https://www.clopaydoor.com/image-gallery/canyon-ridge-elements","ColorDisclaimer":"<p><strong><em></em></strong>With Canyon Ridge&reg; Elements, you can pick from a curated palette of classic and contemporary colors to perfectly complement your home. Standard options include crisp White, rich Bronze, deep Charcoal, bold Black, warm Desert Tan, and striking Iron Ore. Each finish is carefully selected to highlight the door&rsquo;s wood-look texture and clean lines, adding instant curb appeal.</p><p>Want something a little different? The two-tone option lets you mix and match&mdash;choose one color for the steel base and another for the composite overlay for a truly custom look. If you have a specific shade in mind, the Color Blast&reg; program opens up over 1,500 custom colors, making it easy to match your garage door to your front door, trim, or any other detail on your home.<em></em></p>","TopSectionDisclaimer":"<p>Canyon Ridge® Elements gives you plenty of ways to personalize the top section of your garage door, blending privacy, natural light, and architectural flair.</p>\r\n<p>\r\n\r\nFor a classic, seamless look, Series 1 and 2 Solid top sections (TOP11, TOP12, TOP13, and ARCH1) keep things simple and refined—perfect for homeowners who want a clean, understated style.</p>\r\n<p>\r\n\r\nIf you’d like to invite in more light or add a decorative touch, you can choose from a wide range of window designs. Options like REC11, REC13, REC14, SQ23, SQ24, and several arched styles (ARCH1, ARCH3, ARCH4, ARCH13, ARCH14) let you pick the shape and pattern that best suits your home. These windows not only brighten your garage but also give your door a distinctive, welcoming appearance.</p>\r\n<p>\r\n\r\nFor double doors, special designs like ARC1A, ARC3A, ARC4A, ARC13A, and ARC14A are available in both solid and windowed versions, ensuring a balanced, beautiful look no matter the size of your opening.</p>\r\n","HardwareDisclaimer":"<p>Every Canyon Ridge® Elements door comes standard with spade lift handles—sturdy, easy to grip, and designed for the door’s carriage house style. If you want to personalize further, you can upgrade to other handle designs like spear or colonial lift handles or opt for decorative styles such as the ring door knocker, escutcheon plates, or twisted “L” handles. Each handle is crafted from durable materials for long-lasting use and a satisfying feel.</p>\r\n<p>Step plates and hinges let you fine-tune the details: choose from spade, spear, or colonial styles to match your handles or create your own combination. All hardware is finished in a weather-resistant black powder coat, giving you a timeless look that won’t fade or chip easily.</p>\r\n","DesignDisclaimer":"","RelatedProducts":[],"ProductBrochures":[{"Title":"Canyon Ridge Brochure","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/rsdr-canyonridgebr-20-1.webp?sfvrsn=9c9dfc36_5","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-CANYONRIDGEBR-20.pdf","Extension":"PDF","DisplayIndex":1},{"Title":"Products Available Through Independent Dealers","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/idea-book.webp?sfvrsn=699cfb64_5","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-IMAGINE-14.pdf","Extension":"PDF","DisplayIndex":2}],"ProductInstallationAndCare":[{"Title":"Installation Manual for Residential Sectional Insulated Steel Doors","ImageUrl":"https://www.clopaydoor.com/images/default-source/installation-instructions/installmanual-insulatedresi.webp?sfvrsn=15f3a601_3","Type":"Instruction Manual","Url":"https://literature.clopay.com/pdf_files/INST-4150077_EN.pdf","Extension":"PDF","DisplayIndex":1},{"Title":"Canyon Ridge Care and Maintenance","Image tps://www.clopaydoor.com/images/default-source/product-images/showcase-images/modern-steel-plank-kona.webp?sfvrsn=952e3bd4_17","CanonicalUrl":"https://www.clopaydoor.com/modern-steel-plank","Overview":"<h3>Built for Modern Style and Everyday Ease</h3><h4>Durable 3-Layer Construction</h4><p>The Modern Steel&trade; Ultra-Grain&reg; Plank door is built from heavy-duty steel, high-performance insulation, and a rugged, low-maintenance exterior for lasting strength and security.</p><h4>Warm Wood Look</h4><p>Get the rich, textured appearance of real wood with digitally printed Ultra-Grain&reg; Plank finishes&mdash;no staining, painting, or upkeep required.</p><h4>Custom Finishes &amp; Windows</h4><p>Choose from six unique Ultra-Grain&reg; Plank colors and mix in contemporary window options, including short, long, or slim glass panels that can be placed exactly how you want them.</p><h4>Superior Insulation</h4><p>With 2\" <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane foam</a> and an impressive 18.4 R-value, this door keeps your garage quiet and more comfortable all year long.</p><h4>WindCode&reg; Reinforcement</h4><p><a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">Optional wind load upgrades</a> help protect your door in extreme weather, so you can feel confident in any climate.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li><li>2\" thick polystyrene doors and all Intellicore&reg; insulation doors comply with 2015 IECC air infiltration requirement of 0.40 cfm/ft2 or less (IECC, Section C402.5.2).</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Modern Steel&trade; Ultra-Grain&reg; Plank</h3><p>The Modern Steel&trade; Ultra-Grain&reg; Plank door is designed to deliver serious performance with everyday convenience. Each door features a robust three-layer construction: a tough steel exterior, 2 inches of <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Clopay&rsquo;s proprietary Intellicore&reg; polyurethane foam insulation</a>, and a strong steel backing. This insulation process fills every inch of the door, giving it outstanding strength and helps regulate the temperature inside the garage.</p><p>Tongue-and-groove section joints help keep out wind, rain, and snow, while a replaceable vinyl bottom seal in a corrosion-resistant aluminum retainer keeps dust and moisture at bay. Heavy-duty 14-gauge steel hinges and smooth 10-ball nylon rollers come standard for reliable, quiet operation.</p><p>Built for durability, the door resists rust and dents, and special features like the patented Safe-T-Bracket&reg; and sturdy step plates make operation both safe and easy. Even window grilles are removable for easy cleaning.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-modernsteel-3l-2-pur-stucco.webp?sfvrsn=6478afad_1\" alt=\"Modern Steel Ultra-Grain Plank 3-Layer Cutaway\" sf-size=\"100\" /><ol><li>Steel</li><li>Intellicore&reg; Polyurethane </li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Modern Steel Ultra-Grain Plank","DisplayIndex":8,"ImageGallery":"https://www.clopaydoor.com/image-gallery/modern-steel-ultra-grain-plank","ColorDisclaimer":"<p>The Modern Steel&trade; Ultra-Grain&reg; Plank door comes in a curated palette of six rich, wood-inspired finishes: Kona, Coastal Gray, Espresso, Barnwood, Natural, and Cedar. Each finish is digitally printed to capture the authentic look and texture of real wood, with unique graining that never repeats. From the deep, warm tones of Kona and Espresso to the cool, modern vibe of Coastal Gray or the rustic appeal of Barnwood and Cedar, there&rsquo;s a color to fit every style of home. These exclusive Ultra-Grain&reg; Plank finishes are designed to enhance the door&rsquo;s precise lines and add standout curb appeal, all without the maintenance a wood door would require.</p>","TopSectionDisclaimer":"<p>There are a number of ways to use windows and the top section to personalize your Modern Steel&trade; Ultra-Grain&reg; Plank door. Be flashy with contemporary slim windows in silver or black for a sleek look which with a modern edge. If you want something more timeless, choose from plain short or long architectural series windows, which add light and style without overpowering your door&rsquo;s natural wood appearance. All windows use durable acrylic, and you can mix and match placements to let in as much, or as little, light as you want.</p><p><em>*Acrylic window designs.<br />***Contemporary Slim windows available on 2\" thick models only. See dealer for availability.</em></p>","HardwareDisclaimer":"","DesignDisclaimer":"<p>*Only available with Architectural Series Windows.<br />Learn more about other Modern Steel door designs <a href=\"https://www.clopaydoor.com/modern-steel-collection\">here</a>.<br />Depending on door height, exact door appearance and number of sections may be different than illustrations above. <a href=\"http://clopaypdfs.com/pdf_files/RSDR-RESISTACKGUIDE-20.pdf\" target=\"_blank\" data-sf-ec-immutable=\"\">Click here</a> for complete details.</p>","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Modern","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/canyon-ridge-modern-roulette-medium-clear-cypress-showcase.webp?sfvrsn=890cb293_1","Id":"26","Url":"https://www.clopaydoor.com/canyon-ridge-modern-garage-doors","DisplayIndex":6,"ShortDescription":"Faux wood insulated garage doors with contemporary style","AlternativeText":"Canyon Ridge Modern"},{"Title":"Avante<sup class='symbolstxt'>®</sup> – Now Available with C-Power™ Technology","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/tnahcpower01showcase.webp?sfvrsn=e1a1ed6c_1","Id":"16","Url":"https://www.clopaydoor.com/avante","DisplayIndex":9,"ShortDescription":"Aluminum and glass doors that make your garage a stunning focal point, providing natural light by day and a dramatic glow at night","AlternativeText":"Avante"},{"Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Modern","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-modern-design-cladding-solid-garage-door-595.webp?sfvrsn=b04b7a7a_9","Id":"25","Url":"https://www.clopaydoor.com/reserve-modern-contemporary-garage-doors","DisplayIndex":17,"ShortDescription":"Clean lines and simple forms invite the beauty of natural wood stand out","AlternativeText":"Reserve Wood Modern"}],"ProductBrochures":[{"Title":"Modern Steel Brochure","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/rsdr-modernsteelss-15.webp?sfvrsn=340dd814_4","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-MODERNSTEELSS-15.pdf","Extension":"PDF","DisplayIndex":1},{"Title":"Ultra-Grain Paint Option Brochure","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/rsdr-ultragrain-08.webp?sfvrsn=af90ad27_4","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-ULTRAGRAIN-08.pdf","Extension":"PDF","DisplayIndex":2},{"Title":"Products Available Through Independent Dealers","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/idea-book.webp?sfvrsn=699cfb64_5","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-IMAGINE-14.pdf","Extension":"PDF","DisplayIndex":3}],"ProductInstallationAndCare":[{"Title":"Installation Manu mium Colors","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/colors/ultra-grain-plank-barnwood-finish.webp?sfvrsn=8ed85463_1","AlternativeText":"Barnwood"},{"Title":"Ultra-Grain Plank Natural","MainGroupName":"","GroupName":"Premium Colors","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/colors/ultra-grain-plank-natural-finish.webp?sfvrsn=44efbf3b_2","AlternativeText":"Natural"},{"Title":"Ultra-Grain Plank Cedar","MainGroupName":"","GroupName":"Premium Colors","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/colors/ultra-grain-plank-cedar-finish.webp?sfvrsn=1628b4f1_1","AlternativeText":"Cedar"}],"HardwareDesigns":[],"TopSections":[{"Title":"Plain Short","GroupName":"ARCHITECTURAL SERIES WINDOWS","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/top-sections/classicsteel/classic-plain-short.webp?sfvrsn=26fb48a4_1","AlternativeText":"Plain Short","Description":"Classic Steel PLAIN SHORT"},{"Title":"Plain Long","GroupName":"ARCHITECTURAL SERIES WINDOWS","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/top-sections/classicsteel/btncl-pl-4c.webp?sfvrsn=28f1ac1a_3","AlternativeText":"Plain Long","Description":"Classic Steel PLAIN LONG"},{"Title":"Contemporary Slim In Silver***","GroupName":"Contemporary Slim Windows","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/top-sections/modernsteel/378sv-silver-section.webp?sfvrsn=8236ac43_2","AlternativeText":"CONTEMPORARY SLIM IN SILVER","Description":"Modern Steel CONTEMPORARY SLIM IN SILVER"},{"Title":"Contemporary Slim In Black***","GroupName":"Contemporary Slim Windows","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/top-sections/modernsteel/378sv-black-section.webp?sfvrsn=bd97ba99_2","AlternativeText":"CONTEMPORARY SLIM IN BLACK","Description":"Modern Steel CONTEMPORARY SLIM IN BLACK"}],"ProductDesigns":[{"Title":"Flush Panel","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/modernsteel/flush-w-panel.webp?sfvrsn=7d6dc746_2","Description":"MODERN STEEL PLANK FLUSH PANEL","AlternativeText":"Flush"},{"Title":"Flush Panel with full view short panel windows","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/modernsteel/modern-plank-coastal-gray-4r4c-full-view-square.webp?sfvrsn=2036f69_1","Description":"Flush with full view short panel windows","AlternativeText":"Modern Steel Plank Full View"},{"Title":"Flush Panel with short windows","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/modernsteel/modern-plank-coastal-gray-4r4c-square.webp?sfvrsn=daf9a636_1","Description":"Flush panel with short windows","AlternativeText":"Modern Steel Plank Short"},{"Title":"Flush Panel with long windows","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/modernsteel/modern-plank-coastal-gray-4r4c-long-plain.webp?sfvrsn=7f20d975_1","Description":"Flush panel with long windows","AlternativeText":"Modern Steel Plank Long Panel"},{"Title":"Flush Panel with Contemporary Slim Windows","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/modernsteel/modern-plank-coastal-gray-4r4c-slim.webp?sfvrsn=c23d4d96_1","Description":"Flush panel with Contemporary Slim Windows","AlternativeText":"Modern Steel Plank Slim Windows"}],"MaterialOptions":[],"SpecialityGlassOptions":[{"Title":"Clear","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/glass-clear-efx.webp?sfvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Midnight Gray","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/midnight-gray-shine-v1.webp?sfvrsn=63006330_2","DisplayIndex":5,"AlternativeText":"Midnight Gray Glass"}],"SpecsModels":[],"TrackJambModels":[]},"370":{"ProductId":"370","Title":"VertiStack® Avante®","ShortDescription":"Unique, compact design stacks sections on the wall above the opening, eliminating the need for overhead tracks, exposed hinges, track or cable.","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/vertistack-showcase.webp?sfvrsn=fd33839_11","CanonicalUrl":"https://www.clopaydoor.com/vertistack-avante","Overview":"<h3>Built for Modern Living</h3><h4>Commercial-Grade Strength</h4><p>The VertiStack&reg; Avante&reg; features a rugged 2-5/8\" aluminum frame built to handle daily use while keeping maintenance to a minimum.</p><h4>Design Options</h4><p>Personalize your door with a wide range of finishes&mdash;including anodized, painted, or powder-coated aluminum&mdash;and choose from glass, acrylic, polycarbonate, or solid aluminum panels.</p><h4>Light and Insulation, Your Way</h4><p><a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane insulation</a> in the stiles and rails (R-value 3.8) helps keep your space comfortable, while optional tempered insulated glass adds another layer of efficiency.</p><h4>Built for Any Climate</h4><p><a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> is available for those who need extra protection in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li><li>Meets ASHRAE&reg; 90.1 Title 24 and IECC&reg; (International Energy Conservation Code) 2021 Section C406.9 Air Infiltration requirements.</li></ul>","Options":"","Construction":"<h3>Engineered for Strength and Seamless Space</h3><p>The VertiStack&reg; Avante&reg; is built with a tough, 2-5/8\" commercial-grade aluminum frame that stands up to everyday wear and tear. The frame resists rust and corrosion, making it a <a href=\"https://www.clopaydoor.com/residential/buyingguide/how-to-choose-the-right-garage-door-for-your-climate\">smart pick for any climate</a>. Each section is filled with Intellicore&reg; polyurethane insulation, so you get better temperature control and a quieter garage (R-value 3.8). Choose from a variety of panel options&mdash;tempered glass, acrylic, polycarbonate, or solid aluminum&mdash;to match your style and needs.</p><p>One of the standout features is the open-concept stacking design. Instead of swinging overhead, the door sections stack tightly along the wall with minimal projection, leaving your ceiling clear for lights, storage, or even tall vehicles. The panels can even disappear into a recessed soffit, keeping your garage open and uncluttered. Safety brackets and sturdy hardware round out the package for peace of mind and long-lasting performance.</p>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"VertiStack Avante","DisplayIndex":10,"ImageGallery":"https://www.clopaydoor.com/image-gallery/vertistack-avante","ColorDisclaimer":"<p>The VertiStack&reg; Avante&reg; offers a range of finishes designed to complement any modern home. Choose from classic Clear Aluminum (anodized) for a clean, contemporary vibe, or opt for Standard White for a crisp, timeless look. If you&rsquo;re after a touch of warmth or drama, painted finishes like Bronze or Chocolate add rich, understated color that stands out without overpowering your exterior.</p><p>You can also choose from our dramatic anodized options include Bronze, Black, and Dark Bronze. Each one creates a striking, architectural feel and highlights the door&rsquo;s streamlined aluminum design. But no matter which you choose, every finish is engineered for durability and long-lasting beauty.</p>","TopSectionDisclaimer":"","HardwareDisclaimer":"","DesignDisclaimer":"","RelatedProducts":[{"Title":"Avante<sup class='symbolstxt'>®</sup> – Now Available with C-Power™ Technology","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/tnahcpower01showcase.webp?sfvrsn=e1a1ed6c_1","Id":"16","Url":"https://www.clopaydoor.com/avante","DisplayIndex":9,"ShortDescription":"Aluminum and glass doors that make your garage a stunning focal point, providing natural light by day and a dramatic glow at night","AlternativeText":"Avante"},{"Title":"Avante<sup class='symbolstxt'>®</sup> Sleek – Now Available with C-Power™ Technology","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/avante-az-595.webp?sfvrsn=70ef6b44_10","Id":"290","Url":"https://www.clopaydoor.com/avantesleek","DisplayIndex":10,"ShortDescription":"Minimalist frames and slim horizontal windows for bright, unobstructed views","AlternativeText":"Avante Sleek"}],"ProductBrochures":[{"Title":"VertiStack Avante Brochure","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/rsdr-vertistackss-24.webp?sfvrsn=912040da_3","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-VERTISTACKSS-24.pdf","Extension":"PDF","DisplayIndex":1},{"Title":"Products Available Through Independent Dealers","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/idea-book.webp?sfvrsn=699cfb64_5","Type":"Brochure","Url": SpecialityGlassOptions":[],"SpecsModels":[],"TrackJambModels":[]},"380":{"ProductId":"380","Title":"Bridgeport™ Inlay","ShortDescription":"Clean, simple recessed panel design combined with classic carriage house detailing","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/bpinlayshowcase01.webp?sfvrsn=96c68ec5_4","CanonicalUrl":"https://www.clopaydoor.com/bridgeport-inlay","Overview":"<h3>Versatile Design Meets Durability</h3><h4>Textured Details That Pop</h4><p>A pebbled texture on the Inlay highlights its character, blending effortlessly with woodgrain and stucco textures for a look that&rsquo;s both subtle and unique.</p><h4>Built for Versatility</h4><p>Available in one-, two- or three-layer construction on <a target=\"_blank\" href=\"https://www.clopaydoor.com/Bridgeport\">Bridgeport&trade; extended panels</a>, with your choice of 7', 7'3\" or 8' heights and 21\" or 24\" section sizes, so you can find the right fit for any opening.</p><h4>Designs That Speak to You</h4><p>Choose from three eye-catching carriage house inlay patterns&mdash;A, X, or V&mdash;to create exactly the look you want. Finish it off with one of ten solid color options featuring a woodgrain-embossed steel surface, or go with an <a href=\"https://www.clopaydoor.com/residential/buyingguide/ultra-grain\">Ultra-Grain&reg; finish</a>. Premium Black and Iron Ore finishes include thicker 25-gauge steel plus solar reflective paint.</p><h4>Tough Outside, Cozy Inside</h4><p>The durable fiberglass inlay combats harsh weather and UV rays on the exterior. Inside the door, you can choose <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane insulation</a> for exceptional warmth and strength or opt for efficient polystyrene. With R-values ranging from 6.3 to 18.4, you can select the balance of comfort, energy savings, and affordability that works best for your home.</p><h4>Make It Yours</h4><p>You can customize the door with one of six glass options: clear, frosted, midnight gray, seeded, rain, and obscure. Each one lets in a degree of natural light, privacy, and adds a unique touch of style.</p><h4>Ready for Harsh Conditions</h4><p>Add <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement </a> (up to W8 on select models) for additional strength and reliability when the weather turns rough.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Bridgeport&trade; Inlay</h3><p>Every Bridgeport&trade; Inlay garage door starts with a durable core. Select from one-, two- or three-layer construction on sturdy extended panels designed to handle the demands of everyday life. The Inlay is crafted from tough fiberglass that resists warping, weather, and UV light, keeping your door looking its best year-round.</p><p>The Inlay features a pebbled texture that pairs well with woodgrain or stucco surfaces, layered over a steel base and finished with woodgrain embossing. You can choose a solid color or if you prefer the Ultra-Grain&reg; finish, you can select from one of four warm tones&mdash;Medium Oak, Dark Oak, Walnut Oak or Slate Oak. The premium Black and Iron Ore options have a thicker 25-gauge steel with advanced solar reflective paint for extra durability and style.</p><p>Each door is made with galvanized steel and a protective metal oxide layer, then finished with a durable primer and a baked-on topcoat that stands up to rain, sun, and snow. Complete your design with one of three carriage house patterns (A, X, or V) and your pick of six glass styles.</p><p>Every door comes with a replaceable bottom seal to keep out dirt and drafts, plus hardware and steel hinges for quiet, reliable operation. For extra protection in harsh weather, choose WindCode&reg; reinforcement up to W8 on select models.</p><p><img sf-image-responsive=\"true\" src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/inlaycutaway.webp?sfvrsn=d6ca65bc_2\" style=\"max-width:100%;height:auto;\" title=\"inlaycutaway\" alt=\"Bridgeport Inlay cutaway\" sf-size=\"7304\" /></p><ol><li>Steel</li><li>Intellicore&reg; Polyurethane or Polystyrene Insulation</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Bridgeport Inlay","DisplayIndex":12,"ImageGallery":"https://www.clopaydoor.com/image-gallery/bridgeport-inlay","ColorDisclaimer":"<p>Finding your perfect color is easy. Go classic with ten solid shades, including White, Almond, Desert Tan, Sandtone, Chocolate, Mocha Brown, Bronze, and Charcoal. You can also choose from four warm Ultra-Grain&reg; options. If you want to make a statement, Black and Iron Ore are also available, both built with a thicker steel skin and advanced solar reflective paint.</p><p>Keep in mind: some premium finishes are available only on select door models, so check which colors fit your design.</p><p>(S) Stucco Texture<br />(W) Woodgrain Texture<br /></p><p><em>*Not available on all models<br /></em></p><p><em>Black and Iron Ore are subject to additional fee and only available on 25-gauge steel<br />Exterior steel on standard color doors has a natural woodgrain texture.<br />Doors can be painted to match the home&rsquo;s exterior using a high-quality\r\n        latex exterior paint. Do not use oil-based paint.</em></p>","TopSectionDisclaimer":"<p>You can also personalize your Bridgeport&trade; Inlay door with window (or no window) options tailored to your taste. Go with a solid top section for a clean, cohesive look, or let in some light with your pick of six glass options: clear, frosted, midnight gray, rain, seeded, or obscure. Clear glass creates an open feel, frosted and obscure block the view while keeping the garage bright, and rain or seeded glass add decorative texture. Midnight gray delivers a sleek, dramatic tint. Whether you want full visibility and brightness or a touch of privacy, there&rsquo;s a glass style to match.</p><p><em>*Acrylic window designs.<br />Note for Double Top Sections: These are specific to double car doors, in addition to options above.</em></p>","HardwareDisclaimer":"<p>Round out your design with hardware that ties everything together. Every Bridgeport&trade; Inlay door comes with color-matched lift handles. You can take it up a notch by adding decorative handles and hinges in spade, spear, or colonial styles, all built to coordinate with your finish. You can even add matching step plates or twisted &ldquo;T&rdquo; or &ldquo;L&rdquo; handles, each option giving your door a bit more personality.</p>","DesignDisclaimer":"<p>Depending on door height, exact door appearance and number of sections may be different than illustrations above.&nbsp;<a data-sf-ec-immutable=\"\" target=\"_blank\" href=\"http://clopaypdfs.com/pdf_files/RSDR-RESISTACKGUIDE-20.pdf\">Click here</a>&nbsp;for complete details.</p>","RelatedProducts":[{"Title":"Gallery<sup class='symbolstxt'>®</sup> Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","Id":"12","Url":"https://www.clopaydoor.com/gallerysteel","DisplayIndex":8,"ShortDescription":"Grooved panel steel carriage house garage doors","AlternativeText":"Gallery Steel"},{"Title":"Bridgeport™ Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/bridgeport-595.webp?sfvrs           return '<button type="button" class="twxdb-chip twxdb-chip--wide'
            + (selected ? ' is-sel' : '') + '" data-act="window" data-i="' + option.index + '">'
            + imageHTML(option.item.image, option.item.title, '', 'lazy')
            + '<span>' + display(option.item.titleHtml) + '</span></button>';
        }).join('');
        return (group.name ? '<h3 class="twxdb-g">' + esc(group.name) + '</h3>' : '')
          + '<div class="twxdb-chips">' + chips + '</div>';
      }).join('');
      return '<h2 class="twxdb-h">' + TITLES.windows + '</h2>' + noneCard + groups
        + '<p class="twxdb-cap">' + SAMPLE_CAPTION + '</p>';
    }

    function viewGlass() {
      var current = controller.state;
      var cards = current.product.glass.map(function (glass, index) {
        var selected = current.glass === glass;
        return '<button type="button" class="twxdb-card' + (selected ? ' is-sel' : '')
          + '" data-act="glass" data-i="' + index + '">'
          + imageHTML(glass.image, glass.title, '', 'lazy')
          + '<span class="twxdb-card-t">' + display(glass.titleHtml) + '</span></button>';
      }).join('');
      return '<h2 class="twxdb-h">' + TITLES.glass + '</h2><div class="twxdb-grid">'
        + cards + '</div><p class="twxdb-cap">' + SAMPLE_CAPTION + '</p>';
    }

    function viewSummary() {
      return '<h2 class="twxdb-h">Review your specification and get your free quote</h2>'
        + '<p class="twxdb-sub">We will use these selections to prepare your free quote. Manufacturer images are references; Twins confirms the exact appearance before ordering.</p>'
        + formHTML();
    }

    function viewThanks() {
      return '<div class="twxdb-app twxdb-thanks"><h2 class="twxdb-h">Thank you!</h2>'
        + '<p>Thanks — your specification was sent to our team. We will call you shortly to confirm options and prepare your quote.</p></div>';
    }

    function render(scroll) {
      var current = controller.state;
      var html;
      if (current.step === 'fallback') {
        html = fallbackHTML();
      } else if (current.step === 'thanks') {
        html = viewThanks();
      } else {
        var views = {
          collection: viewCollection,
          design: viewDesign,
          color: viewColor,
          windows: viewWindows,
          glass: viewGlass,
          summary: viewSummary
        };
        html = '<div class="twxdb-app">' + barHTML() + previewHTML() + views[current.step]() + '</div>';
      }
      mount.innerHTML = html;
      if (scroll && mount.scrollIntoView) {
        mount.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderLoading(message) {
      mount.innerHTML = '<div class="twxdb-load">' + esc(message) + '</div>';
    }

    function pickProductById(productId) {
      renderLoading('Loading door details…');
      return controller.selectProduct(productId).then(function () {
        render(true);
      });
    }

    mount.addEventListener('click', function (event) {
      var element = event.target.closest ? event.target.closest('[data-act]') : null;
      if (!element || !mount.contains(element)) return;
      var action = element.getAttribute('data-act');
      var index = parseInt(element.getAttribute('data-i') || '-1', 10);
      if (action === 'product') {
        var product = controller.state.products[index];
        if (product) pickProductById(product.id);
        return;
      }
      if (action === 'design' || action === 'color' || action === 'window' || action === 'glass') {
        controller.choose(action, index);
      } else if (action === 'back') {
        controller.back();
      } else if (action === 'skip') {
        controller.skipToQuote();
      } else {
        return;
      }
      render(true);
    });

    mount.addEventListener('submit', function (event) {
      var form = event.target;
      if (!form.classList || !form.classList.contains('twxdb-form')) return;
      event.preventDefault();
      function g(name) {
        var element = form.querySelector('[name="' + name + '"]');
        return element ? element.value.trim() : '';
      }
      var err = form.querySelector('.twxdb-err');
      var btn = form.querySelector('button[type="submit"]');
      if (btn.disabled) return;
      if (!g('name') || !g('phone') || !g('email') || !g('zip')) {
        err.hidden = false;
        err.textContent = 'Please fill in your name, phone, email and zip.';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Sending…';
      err.hidden = true;
      function showLeadError() {
        btn.disabled = false;
        btn.textContent = BTN_LABEL;
        err.hidden = false;
        err.innerHTML = 'Something went wrong sending your specification. Call us at <a href="tel:'
          + PHONE.tel + '">' + PHONE.disp + '</a> and we\'ll take it from there.';
      }
      var formValues = {
        name: g('name'),
        phone: g('phone'),
        email: g('email'),
        zip: g('zip'),
        notes: g('notes'),
        website: g('website')
      };
      controller.submit(formValues).then(function (result) {
        if (!result.ok) {
          showLeadError();
          return;
        }
        render(true);
      }).catch(showLeadError);
    });

    mount.addEventListener('load', function (event) {
      if (event.target.matches && event.target.matches('.twxdb img')) {
        event.target.style.setProperty('--twxdb-natural-width', event.target.naturalWidth + 'px');
      }
    }, true);

    renderLoading('Loading door collections…');
    controller.load(search).then(function () {
      render();
    });
    return true;
  }

  return { createController: createController, boot: boot, imageHTML: imageHTML };
}));
</script>
</body></html>
