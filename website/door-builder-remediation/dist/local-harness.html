<style id="twxdb-css">.twxdb{max-width:1140px;margin:0 auto;color:var(--tw-navy)}
.twxdb,.twxdb *{box-sizing:border-box}
.twxdb img{display:block;width:auto;height:auto;max-width:min(100%,var(--twxdb-natural-width,100%))}
.twxdb button{font-family:inherit}
.twxdb-h{font-family:Montserrat,sans-serif;font-weight:800;font-size:24px;line-height:1.15;color:var(--tw-navy);margin:0 0 8px}
.twxdb-h:after{content:"";display:block;width:56px;height:4px;background:var(--tw-yellow);border-radius:2px;margin-top:10px}
.twxdb-sub{font-size:15px;color:var(--tw-navy);opacity:.75;line-height:1.55;margin:0 0 18px}
.twxdb-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:0 0 18px}
.twxdb-dots{display:flex;gap:9px;width:100%;order:-1;justify-content:center;padding:4px 0 10px}
.twxdb-dot{width:11px;height:11px;border-radius:50%;background:#F2F5F7;border:2px solid var(--tw-navy);opacity:.3}
.twxdb-dot.is-done{background:var(--tw-navy);opacity:1}
.twxdb-dot.is-current{background:var(--tw-yellow);opacity:1}
.twxdb-dot.is-skip{opacity:.12;border-style:dashed}
.twxdb-back{background:white;border:2px solid #F2F5F7;color:var(--tw-navy);font-weight:700;font-size:14px;border-radius:6px;padding:10px 16px;min-height:44px;cursor:pointer}
.twxdb-back:hover{border-color:var(--tw-navy)}
.twxdb-skip{margin-left:auto;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;color:var(--tw-navy);text-decoration:underline;cursor:pointer;background:none;border:0;padding:10px 0;min-height:44px}
.twxdb-visuals{display:grid;gap:18px;margin:0 0 20px;align-items:start}
.twxdb-preview{margin:0;background:#F2F5F7;border-radius:12px;padding:14px;text-align:center}

.twxdb-picks{display:flex;flex-direction:column;gap:8px;font-size:14px;margin:0 0 20px}

.twxdb-card{display:flex;flex-direction:column;gap:8px;text-align:left;background:white;border:2px solid #F2F5F7;border-radius:10px;padding:10px;cursor:pointer;min-height:44px}
.twxdb-card:hover{border-color:var(--tw-navy)}

.twxdb-chip:hover{border-color:var(--tw-navy)}

.twxdb-noneimg{display:block;width:46px;height:46px;border-radius:50%;background:#F2F5F7;border:2px solid var(--tw-navy)}
.twxdb-cap{font-size:12.5px;color:var(--tw-navy);opacity:.7;line-height:1.5;margin:14px 0 0}
.twxdb-disc{font-size:12px;color:var(--tw-navy);opacity:.6;line-height:1.5;margin:10px 0 0}
.twxdb-form{background:white;border:2px solid #F2F5F7;border-radius:12px;padding:20px;max-width:460px;margin-top:18px}
.twxdb-form label{display:block;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:var(--tw-navy);margin:0 0 4px}
.twxdb-form .twxdb-fld{margin:0 0 12px}

.twxdb-in:focus{outline:none;border-color:var(--tw-navy)}
textarea.twxdb-in{min-height:84px;resize:vertical}
.twxdb-btn{display:inline-block;width:100%;background:var(--tw-yellow);color:var(--tw-navy);font-family:Montserrat,sans-serif;font-weight:700;font-size:16px;line-height:1;padding:16px 28px;border-radius:6px;border:0;letter-spacing:.02em;cursor:pointer;min-height:48px}
.twxdb-btn:disabled{opacity:.6;cursor:default}
.twxdb-err{background:#F2F5F7;border-left:4px solid var(--tw-yellow);border-radius:6px;padding:12px 14px;font-size:14px;color:var(--tw-navy);line-height:1.5;margin-top:12px}
.twxdb-err a{color:var(--tw-navy);font-weight:700}
.twxdb-hp{position:absolute!important;left:-9999px!important;top:auto!important;width:1px;height:1px;overflow:hidden}
.twxdb-none{font-size:15px;color:var(--tw-navy);opacity:.8;line-height:1.55;margin:0 0 6px}
.twxdb-load{padding:40px 0;text-align:center;font-size:15px;color:var(--tw-navy);opacity:.75}
.twxdb-thanks{text-align:center;padding:44px 16px}
.twxdb-thanks .twxdb-h:after{margin-left:auto;margin-right:auto}
.twxdb-thanks p{font-size:16px;line-height:1.6;margin:0 auto;max-width:520px}
@media(min-width:700px){.twxdb-visuals{grid-template-columns:minmax(0,2fr) minmax(180px,1fr)}.twxdb-h{font-size:30px}.twxdb-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.twxdb-dots{width:auto;order:0}}
@media(min-width:1000px){.twxdb-grid{grid-template-columns:repeat(4,minmax(0,1fr))}}

oor embodies our total commitment to design, detail and craftsmanship","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-le-chevron-595.webp?sfvrsn=2b65fc56_8","CanonicalUrl":"https://www.clopaydoor.com/reserve-custom","Overview":"<h3>Crafted for Lasting Beauty and True Customization</h3><h4>Handcrafted Construction</h4><p>Each door is built with a solid 4- or 5-layer structure, combining premium wood overlays, an insulated Hemlock frame, and a sturdy interior backer for strength and lasting performance.</p><h4>The Finest Materials</h4><p>Choose from sustainably sourced woods like Cedar, Mahogany, or Oak. All carefully selected for beauty and durability and built by our skilled craftsmen.</p><h4>Designed Your Way</h4><p>Make it truly yours with endless design options. Pick your favorite wood species, go for a classic or bold look, and choose from hundreds of stain and paint finishes including over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; custom colors</a>.</p><h4>Energy-Saving Comfort</h4><p><a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-materials/insulation\">Polystyrene insulation</a> helps maintain a comfortable temperature inside your garage year-round.</p><h4>Ready for Any Climate</h4><p>Need extra protection? Ask about our <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> for reliable performance in high-wind regions.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Reserve&reg; Wood Custom</h3><p>Upgrade your home with a garage door that&rsquo;s as sturdy as it is stunning. Every Reserve&reg; Wood Custom door is handcrafted from sustainable, naturally fallen wood, highlighting the unique character of each fine wood species.</p><p>These doors are built with a multi-layer design: a beautiful wood overlay, your choice of base materials, an insulated Hemlock frame for added strength and comfort, and a Luan backer for extra durability. Polystyrene insulation is tucked inside to help keep your garage comfortable year-round.</p><p>Each door is constructed in three panel sections to accommodate larger window openings. A unique one-piece drip cap keeps water away from the overlays, protecting your door from moisture and extending its life. Premium hardware and smooth-gliding rollers mean every open and close is quiet and effortless, while a replaceable vinyl bottom weather seal helps block out air and water. Choose from convenient overhead operation or an authentic swing-out carriage house style.</p><p><img src=\"https://www.clopaydoor.com/images/default-source/blog/cutaway-reserve-wood-limited-edition400.webp?sfvrsn=60ed907d_1\" alt=\"Reserve Wood Limited Edition Cutaway\" sf-size=\"100\" /></p><ol><li>Wood Overlay</li><li>Optional Base Material</li><li>Base Material</li><li>Polystyrene Insulated Hemlock Frame</li><li>Luan Inside Backer</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Reserve Wood Custom","DisplayIndex":15,"ImageGallery":"https://www.clopaydoor.com/image-gallery/reserve-wood-custom","ColorDisclaimer":"","TopSectionDisclaimer":"","HardwareDisclaimer":"","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showca ition/normal/reserve-limited-edition-beautyreservele8-min-garage-door-822.webp?sfvrsn=1d82c2f6_8","ThumbnailImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/reservewoodlimitededition/thumbnails/reserve-limited-edition-beautyreservele8-min-garage-door-186.webp?sfvrsn=e2da8b00_4","VideoUrl":null,"Title":"Reserve Wood Limited Edition 04"}],"Colors":[],"HardwareDesigns":[],"TopSections":[],"ProductDesigns":[],"MaterialOptions":[],"SpecialityGlassOptions":[],"SpecsModels":[],"TrackJambModels":[]},"9":{"ProductId":"9","Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Semi-Custom","ShortDescription":"Let the lasting beauty of a natural wood door welcome you home","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-semi-custom-design4-rec14-window-hemlock-garage-door-822.webp?sfvrsn=a767211d_8","CanonicalUrl":"https://www.clopaydoor.com/Reserve-Semi","Overview":"<h3>Classic Craftsmanship Tailored for Your Home</h3><h4>Handcrafted Wood Construction</h4><p>Each door is built from two layers of real wood, offering natural beauty with the unmistakable feel of artisan quality.</p><h4>Customizable Designs</h4><p>Pick from six timeless recessed panel styles in your choice of redwood, hemlock, or cedar. Top it off with optional true divided lite windows and decorative hardware to match your taste.</p><h4>Finish It Your Way</h4><p>Doors can be factory primed, painted, or stained. You can choose from over 1,500 custom <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; shades</a> for a look that&rsquo;s all your own.</p><h4>Sustainable Materials</h4><p>We use wood sourced from sustainable and naturally fallen forests, so you can feel good about your choice.</p><h4>Built for Weather</h4><p>Ask about <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> for added strength in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Reserve&reg; Wood Semi-Custom</h3><p>Every Reserve&reg; Wood Semi-Custom door starts with a sturdy Hemlock frame, carefully joined for lasting strength. The panels are crafted from high-quality wood and backed with Luan, giving you a door that not only looks beautiful but stands up to years of use. While this model is <a href=\"https://www.clopaydoor.com/residential/buyingguide/insulated-vs-non-insulated-garage-doors\">non-insulated</a>, the solid wood construction naturally helps buffer sound and temperature.</p><p>The heavy-duty hinges, rollers, and tracks keep your door opening smoothly and quietly. For larger window designs, the door is built in three sections, allowing for wider, more impressive window openings with true divided lites.</p><p>Practical features matter, too. A replaceable vinyl weather seal, set in an optional aluminum retainer, helps block out drafts and water at the bottom of your door. And with the patented Safe-T-Bracket&reg;, you get an extra layer of safety, protecting against accidental injury during maintenance or repairs.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-reserve-wood-semi-custom.webp?sfvrsn=f9e385d1_1\" alt=\"Reserve Wood Semi-Custom\" sf-size=\"100\" /><br /><ol><li>Wood Frame and Panels</li><li>Luan Backer</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Reserve Wood Semi-Custom","DisplayIndex":18,"ImageGallery":"https://www.clopaydoor.com/image-gallery/reserve-wood-semi-custom","ColorDisclaimer":"<p>The Reserve&reg; Wood Semi-Custom door is available in a range of stains with each color designed to enhance the natural grain and character of the wood. You can choose from the warmth of Natural and Natural Oak to the depth of Mahogany, Teak, Butternut, Cedar, and Dark Oak. For a contemporary touch, options like Dark Oak Ebony Wash and Ebony Wash add dramatic contrast. If you want a clean, classic look, try the crisp White paint finish that pairs beautifully with nearly any home style. And if you have a very specific vision, custom colors are available.</p><p><em>Clopay stain colors show on Hemlock wood. Note: Color may vary from on screen. *Custom colors are available.<br />*Available on select models.</em></p>","TopSectionDisclaimer":"<p>You can go for solid panels for a classic, streamlined look, or add a range of window designs from traditional rectangles and squares to graceful arches. Choose simple, clean lines or make a statement with divided lites; there’s a window option to fit every style.</p>\r\n<p>\r\n\r\nIf you have a double garage, we offer special arched top sections designed to complement wider doors and add architectural interest. No matter which configuration you choose, each window style is crafted to let in the sunlight while highlighting your door’s handcrafted details. It’s all about giving your garage door that just-right look to match your home.</p>\r\n","HardwareDisclaimer":"<p>The right hardware can transform your garage door to something eye-catching. Every Reserve® Wood Semi-Custom door comes standard with spade lift handles, but you can personalize your door even further with a variety of optional handles including spear and colonial styles, or even a classic ring door knocker for a bit of old-world charm.</p>\r\n<p>You can also add matching step plates and strap hinges in spade, spear, or colonial designs to tie everything together. Each piece is crafted from durable materials and finished in traditional black, giving your door a timeless look while standing up to everyday use.</p>\r\n","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr5l-des11-rec13-tampa-showcase.webp?sfvrsn=d9bffbb6_1","Id":"30","Url":"https://www.clopaydoor.com/canyonridge","DisplayIndex":3,"ShortDescription":"Insulated carriage house garage doors with faux wood composite cladding and overlays","AlternativeText":"Canyon Ridge Carriage House (5-Layer)"},{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (4-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr4l-d21-rec13-afp143r.webp?sfvrsn=8ae1d536_3","Id":"29","Url":"https://www.clopaydoor.com/canyon-ridge-4-layer","DisplayIndex":4,"ShortDescription":"Stylish, low maintenance and insulated faux wood garage doors","AlternativeText":"Canyon Ridge Carriage House (4-Layer)"},{"Title":"Gallery<sup class='symbolstxt'>®</sup> Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","Id":"12","Url":"https://www.clopaydoor.com/gallerysteel","DisplayIndex":8,"ShortDescription":"Grooved panel steel carriage house garage doors","AlternativeText":"Gallery Steel"},{"Title":"Coachman<sup class='symbolstxt'>®</sup>","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/coachman-d21-rec13-davidson-595.webp?sfvrsn=d3817fcc_10","Id":"11","Url":"https://www.clopaydoor.com/coachman","DisplayIndex":12,"ShortDescription":"The perfect blend of beauty and practicality, these doors are crafted of durable steel and insulation topped with a textured composite overlay","AlternativeText":"Coachman"},{"Titl ct-images/garage-doors/colors/wood-grooved-extira-texture.webp?sfvrsn=c88be7db_1","AlternativeText":"Wood Color","DisplayIndex":2,"GroupName":"Paint Grade","GroupIndex":1},{"Title":"Hemlock/Hemlock","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/colors/hemlock-hemlock1.webp?sfvrsn=713f70cd_1","AlternativeText":"Hemlock Hemlock","DisplayIndex":3,"GroupName":"Stain Grade","GroupIndex":2}],"SpecialityGlassOptions":[{"Title":"Clear","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/glass-clear-efx.webp?sfvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Seeded","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/seeded-gray-glass.webp?sfvrsn=95fc5802_2","DisplayIndex":1,"AlternativeText":"Seeded"},{"Title":"Rain","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/rain-gray-glass.webp?sfvrsn=7d7ca980_2","DisplayIndex":2,"AlternativeText":"Rain"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"},{"Title":"Narrow Reed","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/narrow-reed-glass.webp?sfvrsn=396d1392_1","DisplayIndex":5,"AlternativeText":"Narrow Reed"},{"Title":"Delta Frost","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/delta-frost-glass.webp?sfvrsn=dc81e33e_2","DisplayIndex":5,"AlternativeText":"Delta Frost Glass"},{"Title":"Frosted Gluechip","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gluechip-glass.webp?sfvrsn=67254206_2","DisplayIndex":6,"AlternativeText":"Frosted Gluechip"}],"SpecsModels":[],"TrackJambModels":[]},"10":{"ProductId":"10","Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Limited Edition","ShortDescription":"Exceptional beauty, durability and energy efficiency","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-limimted-edition-design5-arch1-meranti-garage-door-595.webp?sfvrsn=d5180ef3_10","CanonicalUrl":"https://www.clopaydoor.com/reserve","Overview":"<h3>A Stunning, Handcrafted Beauty</h3><h4>Hand-Built Wood Construction</h4><p>Choose from solid 4- or 5-layer craftsmanship, blending real wood overlays, optional tongue-and-groove base, insulating hemlock framing, and a smooth interior backer. It&rsquo;s a door built to last and look great for years.</p><h4>Genuine Wood, Responsibly Sourced</h4><p>Every door is made from sustainably harvested or naturally fallen wood, hand-selected for your region&rsquo;s climate.</p><h4>Completely Customizable</h4><p>Pick from eight classic carriage house looks, with options for decorative windows and hardware. Select your favorite from eight paint or stain-ready wood species or go bold with over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; custom colors</a>.</p><h4>Built-In Comfort</h4><p><a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-materials/insulation\">Polystyrene insulation</a> (R-value 5.9) helps keep your garage comfortable and energy bills lower, no matter the season.</p><h4>Ready for the Elements</h4><p>Need extra protection? Ask about <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> for reliable performance in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Reserve&reg; Wood Limited Edition</h3><p>Reserve&reg; Wood Limited Edition doors are all about solid construction and smart design. Each door features a polystyrene-insulated Hemlock frame, wrapped with a tough Luan interior backer for extra strength and energy efficiency. On the outside, hand-applied wood overlays, plus an optional tongue-and-groove base, deliver that unmistakable carriage house style. The doors might look like they swing out, but they operate overhead for everyday convenience.</p><p>The details set these doors apart: three-panel section construction allows for larger, authentic window openings, while a unique one-piece drip cap protects against moisture by keeping water away from grooved overlays. True divided windows come standard for that handcrafted look. Premium-grade hardware and tracks keep operation smooth and quiet, and a replaceable vinyl bottom seal (with optional aluminum retainer) blocks out the elements at the base. You get durability, weather resistance, and hassle-free maintenance, all in one standout door.</p><img sf-image-responsive=\"true\" src=\"https://www.clopaydoor.com/images/default-source/about-us/cutaway-reserve-wood-limited-edition-5l.webp?sfvrsn=754574f2_1\" height=\"345\" style=\"max-width:100%;height:auto;\" title=\"Cutaway-Reserve-Wood-Limited-Edition-5L\" width=\"400\" alt=\"Reserve Wood Limited Edition 5-Layer cutaway\" sf-size=\"10162\" /><br /><ol><li>Wood Overlay</li><li>Optional Base Material</li><li>Base Material</li><li>Polystyrene Insulated Hemlock Frame</li><li>2\" Luan Inside Skin</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Reserve Wood Limited Edition","DisplayIndex":16,"ImageGallery":"https://www.clopaydoor.com/image-gallery/reserve-wood-limited-edition","ColorDisclaimer":"<p>Give your garage door a look that&rsquo;s unique with a selection of classic stains and paint finishes. Choose from rich wood stains like Natural, Natural Oak, Cedar, Teak, Butternut, Mahogany, Dark Oak, Dark Oak Ebony Wash, and Ebony Wash, each designed to bring out the natural grain and character of Hemlock wood. Prefer a crisp, clean finish? The white paint option offers versatility and pairs well with almost any home.</p><p>All stains are hand-applied for depth and consistency, but keep in mind that color may appear slightly different depending on your screen and the wood&rsquo;s natural variations. There are also custom colors available on select models.</p><p><em>Clopay stain colors show on Hemlock wood. Note: Color may vary from on screen. Custom colors are available. Available on select models.</em></p>","TopSectionDisclaimer":"<p>Personalize your Reserve® Wood Limited Edition door with a range of top section and window options. Prefer a classic, understated look? Go with a solid top section for clean lines and timeless appeal. If you want to let in more natural light or add architectural flair, choose from several window shapes—rectangular, square, or arched—to match your home’s style.\r\nFrom simple divided panes to dramatic arched designs, each window option is crafted for both beauty and function.</p>\r\n<p>For double doors, there are special arched top sections that really make a statement across wider openings. Whether you love the elegance of curved arches or the simplicity of straight-edged glass, there’s a top section that fits your vision. Each option is designed to highlight the natural wood and bring even more character to your home’s exterior.</p>\r\n","HardwareDisclaimer":"<p>The finishing touch on your Reserve® Wood Limited Edition door is the hardware. Each door comes standard with spade lift handles, giving you a classic carriage house look right out of the box. But you can also upgrade to spear or colonial lift handles, try decorative lift handles for extra flair, or add a ring door knocker or twisted “L” handles for a custom feel. Escutcheon plates are also available for a polished, traditional accent.</p>\r\n<p>\r\n\r\nStep plates are offered in matching spade, spear, or colonial styles, so your hardware ties the design together from top to bottom. Complete the look with coordinating strap hinges; choose from spade, spear, or colonial designs to match your handles and plates. All hardware options are built from durable materials and finished in classic black.</p>\r\n","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr5l-des11-rec13-tampa-showcase.webp?sfvrsn=d9bffbb6_1","Id":"30","Url":"https://www.clopaydoor.com/canyonridge","DisplayIndex":3,"ShortDescription":"Insulated carriage house garage doors with faux wood composite cladding and overlays","AlternativeText":"Canyon Ridge Carriage House (5-Layer)"},{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (4-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr4l-d21-rec13-afp143r.webp?sfvrsn=8ae1d536_3","Id":"29","Url":"https://www.clopaydoor.com/canyon-ridge-4-layer","DisplayIndex":4,"ShortDescription":"Stylish, low maintenance and insulated faux wood garage doors","AlternativeText":"Canyon Ridge Carriage House (4-Layer)"},{"Title":"Gallery<sup class='symbolstxt'>®</sup> Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","Id":"12","Url":"https://www.clopaydoor.com/gallerysteel","DisplayIndex":8,"ShortDescription":"Gro me":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/reservewoodlimitededition/reserve-limited-edition-design-5.webp?sfvrsn=8409a7a_2","Description":"Reserve Wood Limited Edition - Design 5","AlternativeText":"Design 5"},{"Title":"Design 6","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/reservewoodlimitededition/reserve-limited-edition-design-6.webp?sfvrsn=26022bad_2","Description":"Reserve Wood Limited Edition - Design6","AlternativeText":"Design 6"},{"Title":"Design 7","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/reservewoodlimitededition/reserve-limited-edition-design-7.webp?sfvrsn=9917973_2","Description":"Reserve Wood Limited Edition - Design7","AlternativeText":"Design 7"},{"Title":"Design 8","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/reservewoodlimitededition/reserve-limited-edition-design-8.webp?sfvrsn=c53bf6e1_2","Description":"Reserve Wood Limited Edition - Design8","AlternativeText":"Design 8"}],"MaterialOptions":[],"SpecialityGlassOptions":[{"Title":"Clear","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/glass-clear-efx.webp?sfvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Seeded","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/seeded-gray-glass.webp?sfvrsn=95fc5802_2","DisplayIndex":1,"AlternativeText":"Seeded"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"},{"Title":"Delta Frost","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/delta-frost-glass.webp?sfvrsn=dc81e33e_2","DisplayIndex":5,"AlternativeText":"Delta Frost Glass"},{"Title":"Frosted Gluechip","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gluechip-glass.webp?sfvrsn=67254206_2","DisplayIndex":6,"AlternativeText":"Frosted Gluechip"}],"SpecsModels":[],"TrackJambModels":[]},"11":{"ProductId":"11","Title":"Coachman<sup class='symbolstxt'>®</sup>","ShortDescription":"The perfect blend of beauty and practicality, these doors are crafted of durable steel and insulation topped with a textured composite overlay","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/coachman-d21-rec13-davidson-595.webp?sfvrsn=d3817fcc_10","CanonicalUrl":"https://www.clopaydoor.com/coachman","Overview":"<h3>Built for Style, Strength, and Everyday Comfort</h3><h4>Four Layers of Lasting Quality</h4><p>Coachman&reg; doors are crafted from durable steel and insulation, finished with a strong composite overlay. The result? A door that looks gorgeous and stands up to daily life.</p><h4>Genuine Carriage House Charm</h4><p>Get the classic look of wood carriage doors without the upkeep hassle. The textured composite surface mimics real woodgrain, and you never have to worry about sanding or staining.</p><h4>Plenty of Ways to Personalize</h4><p>Pick from 15 carriage house designs, a range of window options, and decorative hardware to match your home&rsquo;s vibe. Available in four standard paint colors or create your dream look with over 1,500 custom <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; finishes</a>.*</p><h4>Serious Insulation</h4><p>Choose from three insulation options, including Clopay&rsquo;s advanced <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane</a>, with R-values from 6.5 up to 18.4 to help keep your garage more comfortable through every season.</p><h4>Engineered for Tough Weather</h4><p><a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> is available for extra protection in high-wind regions.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul><p><em>*Due to <a target=\"_blank\" href=\"https://www.clopaydoor.com/common/lrv\">LRV</a> requirements, the Coachman CANNOT be painted dark colors. Doing so will void the warranty. Please see <a href=\"https://www.clopaydoor.com/elements\">Canyon Ridge&reg; Elements</a> for dark color options.</em>\r\n </p>","Options":"","Construction":"<h3>Built to Last, Designed for Everyday Living</h3><p>Coachman&reg; garage doors are engineered for both beauty and endurance, starting with a multi-layer build that means business. At the core, you&rsquo;ll find a strong steel base, followed by high-performance insulation. Choose from advanced Intellicore&reg; polyurethane or polystyrene options for maximum warmth, quiet, and energy savings. Another layer of steel adds strength, and the whole door is topped with a composite overlay that captures the classic carriage house look.</p><p>Every Coachman&reg; door features a rust-prevention system with hot-dipped galvanized steel, protective coatings, and a baked-on finish for long-lasting color. Maintenance stays simple with a replaceable vinyl bottom seal that keeps out drafts and water. Safety is built in, too, thanks to the patented Safe-T-Bracket&reg; and heavy-duty hardware. Removable window grilles make cleaning a breeze, and all insulated models use smooth-gliding nylon rollers and tough 14-gauge steel hinges for reliable operation year after year.</p><p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-coachman.webp?sfvrsn=d8baf07b_3\" alt=\"Coachman\" sf-size=\"6462\" /></p><ol><li>Composite Overlay</li><li>Steel</li><li>Insulation with thermal break (2\" Intellicore<sup>&reg;</sup> polyurethane, 2\" polystyrene or 1-3/8\" polystyrene insulation. R-values from 6.5 to 18.4)</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Coachman","DisplayIndex":12,"ImageGallery":"https://www.clopaydoor.com/image-gallery/coachman","ColorDisclaimer":"<p>Coachman&reg; doors offer a curated selection of factory-finished colors designed to highlight the door&rsquo;s carriage house details. Choose from classic combinations like White, Almond, Desert Tan, or Sandtone for both the base and the overlay or mix and match overlay and base colors for a custom look.</p><p>For more personalization, you can choose from <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> and more than 1,500 Sherwin-Williams custom colors. This flexibility means your garage door can blend in seamlessly or stand out as a statement piece.</p><p>Just remember, dark colors (with a Light Reflective Value [LRV] of 12 or less) aren&rsquo;t recommended for Coachman&reg; doors and will void the warranty. For darker finishes, Clopay offers alternative product lines, and for colors with an LRV of 13 to 39, only approved paints should be used to maintain your warranty coverage. If you have any questions, be sure to talk with <a href=\"https://www.clopaydoor.com/where-to-buy\">your local Clopay expert</a>.</p>","TopSectionDisclaimer":"<p>Coachman® lets you fine-tune your garage door’s look with a wide range of top section options. Prefer classic and understated? Choose from several solid top panel designs. If you want to invite more natural light or add a decorative accent, there are multiple window styles—rectangular, square, and arched—each available in different grid patterns.</p>\r\n<p>For larger, double doors, special double-arch and window configurations make a big visual impact and complement wider facades. Every window grille is removable for easy cleaning, so your door always looks its best with minimal effort.</p>\r\n","HardwareDisclaimer":"","DesignDisclaimer":"","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr5l-des11-rec13-tampa-showcase.webp?sfvrsn=d9bffbb6_1","Id":"30","Url":"https://www.clopaydoor.com/canyonridge","DisplayIndex":3,"ShortDescription":"Insulated carriage house garage doors with faux wood composite cladding and overlays","AlternativeText":"Canyon Ridge Carriage House (5-Layer)"},{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (4-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr4l-d21-rec13-afp143r.webp?sfvrsn=8ae1d536_3","Id":"29","Url":"https://www.clopaydoor.com/canyon-ridge-4-layer","DisplayIndex":4,"ShortDescription":"Stylish, low maintenance and insulated faux wood garage doors","AlternativeText":"Canyon Ridge Carriage House (4-Layer)"},{"Title":"Gallery<sup class='symbolstxt'>®</sup> Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","Id":"12","Url":"https://www.clopaydoor.com/gallerysteel","DisplayIndex":8,"ShortDescription":"Grooved panel steel carriage house garage doors","AlternativeText":"Gallery Steel"},{"Title":"Grand Harbor<sup class='symbolstxt'>®</sup>","ImageUrl":"https://www.clopaydoor.com oved panel steel carriage house garage doors","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","CanonicalUrl":"https://www.clopaydoor.com/gallerysteel","Overview":"<h3>Style Meets Strength</h3><h4>Built Your Way</h4><p>Choose from 3-, 2-, or 1-layer construction to fit your needs and budget. Each option is crafted from tough steel for daily reliability.</p><h4>Custom Looks</h4><p>Pick short or long grooved panels, add windows and decorative hardware, and select from 16 standard colors including rich <a href=\"https://www.clopaydoor.com/residential/buyingguide/ultra-grain\">Ultra-Grain&reg; wood-look</a> and modern Lustra&trade; matte finishes. Or try over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; custom shades</a> to get exactly the right color.</p><h4>Comfortable &amp; Quiet</h4><p>Insulation options include <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane</a> or classic polystyrene, providing R-values from 6.5 up to 18.4. That means a more comfortable garage, year-round.</p><h4>Weather Ready</h4><p>Optional <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> adds security in high-wind areas, so your door is as tough as it is stylish.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Gallery&reg; Steel</h3><p>The Gallery&reg; Steel door is built to handle whatever your day throws at it. Each door is crafted with sturdy steel inside and out, sandwiching a layer of high-performance <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane</a> or standard polystyrene insulation. This multi-layer construction helps keep your garage warmer in winter, cooler in summer, and quieter all year long.</p><p>Clopay&rsquo;s rust-prevention system protects your investment with hot-dipped galvanizing, a tough metal oxide pretreatment, and a baked-on finish for lasting beauty with minimal upkeep. A replaceable vinyl bottom weather seal in a rust-resistant aluminum retainer helps block out drafts and water, while heavy-duty hardware and 10-ball nylon rollers keep everything running smoothly.</p><p>Safety comes standard, thanks to the patented Safe-T-Bracket&reg;, and removable window grilles make cleaning a breeze. Altogether, you get a door that&rsquo;s durable, low-maintenance, and designed to look great for years.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-gallery-steel.webp?sfvrsn=f0d415d7_4\" alt=\"Gallery Steel\" sf-size=\"6672\" /><p>&nbsp;</p><ol><li>Steel</li><li>Intellicore&reg; Polyurethane or Polystyrene Insulation</li><li>Steel</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Gallery Steel","DisplayIndex":8,"ImageGallery":"https://www.clopaydoor.com/image-gallery/gallery-steel","ColorDisclaimer":"<p><strong><em></em></strong>The Gallery&reg; Steel door comes in a near endless variety of colors and finishes. Choose from standard colors like White, Almond, Desert Tan, Sandtone, Chocolate, Bronze, Mocha Brown, and Charcoal for an ageless look that fits any exterior.</p><p>For something extra special, explore premium colors. Get the warmth of real wood with Ultra-Grain&reg; Oak finishes in Medium, Dark, Walnut, or Slate, each with your choice of subtle stucco or authentic woodgrain textures. For a modern twist, try Lustra&trade; matte colors in Charcoal, Black, or Silver, or the bold Iron Ore finish.</p><p>If you need a one-of-a-kind shade, the Color Blast&reg; program lets you pick from over 1,500 custom colors. Just remember, some colors are exclusive to certain door constructions and textures, and premium options are available on 24-gauge steel.</p><p>(S) Stucco Texture<br />(W) Woodgrain Texture<br />(M) Matte Texture</p><p><em>*Not available on Gallery Steel 1- and 2-Layer doors<br />&plusmn;Only available on Gallery Steel 1- and 2-layer doors<br />Premium Colors are subject to additional fee and only available on 24-gauge steel.<br />Custom color available through <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> program.<br />**Promotion valid on new door purchases in the Iron Ore color; savings vary by door size and location.</em></p>","TopSectionDisclaimer":"<p>When it&rsquo;s time to select the windows and top section for your Gallery&reg; Steel door, keep a few things in mind. If you&rsquo;re going for a time-honored look, choose a solid top section. If you want to let in more light or add a unique architectural detail, check out the window options. They range from traditional rectangular panes to arched styles and decorative grilles.</p><p>There are designs to suit every taste: plain glass for a simple look, grilles for a hint of tradition, or even wrought iron-inspired acrylic windows for a bit of fancy. Double doors get exclusive double-arch window styles for standout curb appeal.</p><p><em>*Acrylic window designs.<br />Note for Double Top Sections: These are specific to double car doors, in addition to options above.</em></p>","HardwareDisclaimer":"<p>The handles and hardware on any garage door help create the final look, whether that’s a hint of traditional carriage house charm or a custom accent. Every Gallery® Steel door comes standard with classic spade lift handles, but you can tailor the finishing touches. Choose from a range of optional handle styles including spear, colonial, or the distinctive twisted “T” and “L” handles. Add matching escutcheon plates for a polished, refined look.</p>\r\n<p>Complement your handle choice with coordinating step plates and decorative strap hinges, available in spade, spear, or colonial designs. All hardware is built from sturdy materials and finished in black.</p>\r\n","DesignDisclaimer":"<p>Depending on door height, exact door appearance and number of sections may be different than illustrations above. <a href=\"http://clopaypdfs.com/pdf_files/RSDR-RESISTACKGUIDE-20.pdf\" target=\"_blank\" data-sf-ec-immutable=\"\">Click here</a> for complete details.</p><p>18\" sections not available on 1- and 2-layer doors.</p>","RelatedProducts":[{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (5-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr5l-des11-rec13-tampa-showcase.webp?sfvrsn=d9bffbb6_1","Id":"30","Url":"https://www.clopaydoor.com/canyonridge","DisplayIndex":3,"ShortDescription":"Insulated carriage house garage doors with faux wood composite cladding and overlays","AlternativeText":"Canyon Ridge Carriage House (5-Layer)"},{"Title":"Canyon Ridge<sup class='symbolstxt'>®</sup> Carriage House (4-Layer)","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/cr4l-d21-rec13-afp143r.webp?sfvrsn=8ae1d536_3","Id":"29","Url":"https://www.clopaydoor.com/canyon-ridge-4-layer","DisplayIndex":4,"ShortDescription":"Stylish, low maintenance and insulated faux wood garage doors","AlternativeText":"Canyon Ridge Carriage House (4-Layer)"},{"Title":"Coachman<sup class='symbolstxt'>®</sup>","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/coachman-d21-rec13-davidson-595.webp?sfvrsn=d3817fcc_10", ayIndex":5,"AlternativeText":"Midnight Gray Glass"}],"SpecsModels":[],"TrackJambModels":[]},"13":{"ProductId":"13","Title":"Classic™ Steel","ShortDescription":"Strength and durability in a wide range of looks and colors, so you never have to sacrifice style","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/classicsteel-ironoreshowcase.webp?sfvrsn=25b7a514_1","CanonicalUrl":"https://www.clopaydoor.com/classic","Overview":"<h3>Classic Style, Features that Matter</h3><h4>Built Your Way</h4><p>Choose from 1, 2, or 3-layer steel construction so you get the right mix of durability, insulation, and budget.</p><h4>Strong Steel, Real Options</h4><p>Every door uses tough, reliable steel. Plus you can pick from short or long panel designs, add windows, or go with a wood-look <a href=\"https://www.clopaydoor.com/residential/buyingguide/ultra-grain\">Ultra-Grain&reg; finish</a> for extra charm.</p><h4>Colors for Every Home</h4><p>Select from 14 popular factory colors or customize with over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; paint options</a>.</p><h4>Comfort All Year</h4><p>Insulation options include <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg; polyurethane</a> or polystyrene which keep your garage quieter and more comfortable, with R-values up to 18.4.</p><h4>Ready for Rough Weather</h4><p><a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; door reinforcement</a> is available for homes in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Classic&trade; Steel</h3><p>The Classic&trade; Steel garage door is designed to handle daily use while looking great for years to come. You can choose from single-, double-, or triple-layer construction, with every option starting with high-quality steel for reliable strength. For insulation, pick either Intellicore&reg; polyurethane&mdash;Clopay&rsquo;s advanced foam that expands to fill the door for maximum energy efficiency and durability&mdash;or opt for solid polystyrene panels that add comfort and quiet.</p><p>The exterior steel panels are protected by a multi-layer coating system, including hot-dipped galvanizing, a special metal oxide pretreatment, and a baked-on primer and topcoat, all working together to keep rust away and the finish looking sharp. Maintenance is easy, with a replaceable vinyl bottom seal in a rust-resistant aluminum retainer blocking out water and drafts, and removable window grilles for simple cleaning.</p><p>Safety comes built in, too, thanks to the patented Safe-T-Bracket&reg; that helps prevent injury during maintenance. Insulated models also include smooth, quiet nylon rollers and heavy-duty steel hinges, so your door works smoothly every day.</p><p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-classic-steel-full.webp?sfvrsn=1fb75eda_3\" alt=\"Classic Steel\" sf-size=\"100\" /></p><ol><li>Steel</li><li>Intellicore&reg; Polyurethane or Polystyrene Insulation</li><li>Steel</li></ol><p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-classic-steel-valueplus-value.webp?sfvrsn=89dc6d9c_2\" alt=\"Classic Steel\" sf-size=\"100\" /></p><ol><li>Steel</li><li>Polystyrene Insulation</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Classic Steel","DisplayIndex":19,"ImageGallery":"https://www.clopaydoor.com/image-gallery/classic-steel","ColorDisclaimer":"<p>The Classic&trade; Steel garage door is available in a wide range of colors and finishes. Choose from classic shades like Standard White, Almond, Sandtone, Chocolate, and Desert Tan for a timeless, versatile look. For a bolder statement, select from premium colors such as Black, Bronze, Mocha Brown, Hunter Green, Gray, Charcoal, and Iron Ore. These rich colors add depth to your garage door and work beautifully with modern or traditional exteriors.</p><p>If you love the warmth of wood but want the durability of steel, the Ultra-Grain&reg; finishes in Medium, Cherry, or Walnut offer a realistic wood-look texture without the upkeep of a traditional wood door. If you need a specific color, the ColorBlast&reg; custom paint program lets you match nearly any color scheme, with more than 1,500 custom shades available.</p><p>Keep in mind that not all colors or finishes are available on every model, so be sure to check which options work for your chosen design.</p><p><em>*Available on select models.<br /><a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> Custom Paint Option Available.<br />**Promotion valid on new door purchases in the Iron Ore color; savings vary by door size and location.</em></p>","TopSectionDisclaimer":"<p>With the Classic&trade; Steel collection, you can tailor the top of your garage door, whether you want extra light, a decorative accent, or an uninterrupted look. Choose from a variety of solid top sections for a simple appearance, or get creative with decorative insert windows like Colonial, Charleston, Stockton, Madison, Prairie, and several Sunset styles. The Architectural Series offers everything from plain glass to grilles in rectangles or squares, arches, and even elegant wrought iron-inspired designs. There are also special double door top sections and unique arch window options for wider openings.</p><p><em>*Acrylic window designs.<br />**Available only on 2\" thick 3-Layer doors only.<br />***Sunset Windows not available on Ultra-Grain&reg; doors.</em></p>","HardwareDisclaimer":"","DesignDisclaimer":"<p>Depending on door height, exact door appearance and number of sections may be different than illustrations above. <a href=\"http://clopaypdfs.com/pdf_files/RSDR-RESISTACKGUIDE-20.pdf\" target=\"_blank\" data-sf-ec-immutable=\"\">Click here</a> for complete details.</p>","RelatedProducts":[{"Title":"Modern Steel™","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/modern-steel-flush_fullview-window-black-garage-door-595.webp?sfvrsn=db7014e9_14","Id":"170","Url":"https://www.clopaydoor.com/modern-steel-collection","DisplayIndex":7,"ShortDescription":"Subtle modern beauty, simple up-keep","AlternativeText":"Modern Steel"},{"Title":"Gallery<sup class='symbolstxt'>®</sup> Steel","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/gallery-steel-ug-long-rec14-595.webp?sfvrsn=a7ceae04_9","Id":"12","Url":"https://www.clopaydoor.com/gallerysteel","DisplayIndex":8,"ShortDescription":"Grooved panel steel carriage house garage doors","AlternativeText":"Gallery Steel"},{"Title":"Classic™ Wood","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/classic-wood-design-short-stockton-window-cedar-garage-door-595.webp?sfvrsn=91462566_2","Id":"23","Url":"https://www.clopaydoor.com/classicwood","DisplayIndex":20,"ShortDescription":"Enhance the natural character of your home with a handcrafted Classic™ Wood garage door","AlternativeText":"Classic Wood"}],"ProductBrochures":[{"Title":"Classic Premium Brochure","ImageUrl":"https://www.clopaydoor.com/images/default-source/brochures/rsdr-prem3layerss-13-copy.webp?sfvrsn=834e0748_3","Type":"Brochure","Url":"https://literature.clopay.com/pdf_files/RSDR-PREM3LAYERSS-13.pdf","Extensi s/default-source/product-images/specialty-glass/glass-clear-efx.webp?sfvrsn=47ab2bf1_1","DisplayIndex":1,"AlternativeText":"Clear Glass"},{"Title":"Seeded","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/seeded-gray-glass.webp?sfvrsn=95fc5802_2","DisplayIndex":1,"AlternativeText":"Seeded"},{"Title":"Rain","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/rain-gray-glass.webp?sfvrsn=7d7ca980_2","DisplayIndex":2,"AlternativeText":"Rain"},{"Title":"Frosted","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/frosted-gray-glass.webp?sfvrsn=8276d31_2","DisplayIndex":3,"AlternativeText":"Frosted"},{"Title":"Obscure","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/obscured-gray-glass.webp?sfvrsn=c43269ab_2","DisplayIndex":4,"AlternativeText":"Obscure"},{"Title":"Midnight Gray","Image":"https://www.clopaydoor.com/images/default-source/product-images/specialty-glass/midnight-gray-shine-v1.webp?sfvrsn=63006330_2","DisplayIndex":5,"AlternativeText":"Midnight Gray Glass"}],"SpecsModels":[],"TrackJambModels":[]},"16":{"ProductId":"16","Title":"Avante<sup class='symbolstxt'>®</sup> – Now Available with C-Power™ Technology","ShortDescription":"Aluminum and glass doors that make your garage a stunning focal point, providing natural light by day and a dramatic glow at night","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/tnahcpower01showcase.webp?sfvrsn=e1a1ed6c_1","CanonicalUrl":"https://www.clopaydoor.com/avante","Overview":"<div class=\"d-flex mt-3 mt-lg-4\" data-section-id=\"Durable Construction\"><h3>Modern Style, Lasting Performance</h3></div><div class=\"d-flex mt-3 mt-lg-4\" data-section-id=\"Layer\"><h4>Built Tough</h4></div><p>The Avante&reg; features a strong, 2-1/8\" commercial-grade aluminum frame that stands up to daily use and weather, all while staying low-maintenance.</p><h4>Your Look, Your Way</h4><p>Mix and match from a variety of finishes &mdash; choose anodized, painted, or powder-coated frames, plus over 1,500 custom <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> shades. Fill your panels with tempered glass, acrylic, Polygal, or solid aluminum to match your style and privacy needs.</p><h4>Natural Light &amp; Insulation</h4><p>Let the sun in with clear panels or opt for frosted or tinted glass for privacy. Insulated glass panels are available for extra comfort and energy efficiency.</p><h4>Ready for A Storm</h4><p><a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; door reinforcement</a> is available for homes in high wind areas.</p><h4>C-Power&trade; Technology</h4><p>Our <a href=\"https://www.clopaydoor.com/c-power-technology\">Click-to-Conceal&trade; panels</a> can instantly transition from transparent to opaque with the tap of a remote, providing on-demand visual privacy without sacrificing the door&rsquo;s architectural aesthetic.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li><li>Meets ASHRAE&reg; 90.1 Title 24 and IECC&reg; (International Energy Conservation Code) 2021 Section C406.9 Air Infiltration requirements.</li></ul>","Options":"","Construction":"<h3>Beauty and Strength Meets Modern Engineering</h3><p>The Avante&reg; is built with a virtually maintenance-free, commercial-grade aluminum frame that stands up to daily life and weather. Its 2-1/8\" thick construction includes Intellicore&reg; polyurethane-insulated rails and stiles (on Model AXU), giving you added strength, energy efficiency, and a quieter garage with an R-value of 3.8 when paired with insulated glass.</p><p>Every section of the door features tongue-and-groove joints and a section joint seal to help keep out air and water, so your garage stays more comfortable all year. For double-car models and wider doors, an integral reinforcing fin increases strength and durability.</p><p>Choose from a wide range of tempered glass, acrylic, Polygal, or solid aluminum panels to match your light and privacy needs. The rust-resistant frame and panels are easy to clean and built to last, with safety brackets included.</p><div class=\"options-container\"><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-avanteax-1l-non-tg.webp?sfvrsn=621b921_1\" alt=\"Avante Construction\" sf-size=\"3022\" /><div>Made of 2-1/8&rdquo; durable commercial grade aluminum, making it virtually maintenance-free and long-lasting</div></div><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-avanteaxu.webp?sfvrsn=b2614212_1\" alt=\"Avante Construction\" sf-size=\"2816\" /><div>Model AXU made of 2-1/8\" durable commercial grade aluminum with <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg;</a> polyurethane insulation with an R-value of 3.8 (with clear insulated glass)</div></div><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/avante-ax-section-jointafbb6bf6-aae4-46fe-bfd2-9d85bb40efc2.webp?sfvrsn=7123d472_2\" alt=\"Section Joint\" sf-size=\"4196\" /><div>Integral section joint seal for further reduction of air and water infiltration</div></div><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/avante-ax-frame-detail.webp?sfvrsn=c8ced87e_1\" alt=\"Avante Construction\" sf-size=\"1506\" /><div>Smooth flat frame edge design for a more contemporary look</div></div><div class=\"commerical-image-fixed-width-large\"><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/avante-ax-section-joint01.webp?sfvrsn=ba3d07b5_1\" alt=\"Section Joint\" sf-size=\"5242\" /><div>Reinforcing fin included on doors wider than 14&rsquo;. Standard doors 12&rsquo; and under do not use built-in reinforcing fin. Usage on widths 12&rsquo;2&rdquo; to 14&rsquo; depend upon glass weight. WindCode&reg; doors may vary.</div></div><div class=\"commerical-image-fixed-width-large\"><div><strong></strong>For doors equipped with our innovative and new <a href=\"https://www.clopaydoor.com/c-power-technology\">C-Power&trade; Technology</a>, all wiring is concealed within the door sections for a clean appearance and simple installation.</div></div></div><h2 class=\"h3\">Additional Features</h2><ul><li>Replaceable vinyl bottom weather seal in a rust-resistant aluminum retainer helps keep out air and water.</li><li>Integral section joint seal helps keep out air and water. </li><li>Built-in reinforcing fin provides increased strength and longevity. Included on doors wider than 14&rsquo;. Standard doors 12&rsquo; and under do not use a reinforcing fin. Usage on doors 12&rsquo;2&rdquo; to 14&rsquo; wide depends upon glass weight. <a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg;</a> doors may vary.</li><li>A patented Safe-T-Bracket&reg; prevents serious injury that could occur if the bottom bracket were removed with the garage door closed and under tension</li><li>All <a href=\"https://www.clopaydoor.com/residential/buyingguide/intellicore\">Intellicore&reg;</a> insulated doors come standard with 10-ball nylon rollers and heavy-duty 14-gauge steel hinges.</li></ul>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Avante","DisplayIndex":9,"ImageGallery":"https://www.clopaydoor.com/image-gallery/avante","ColorDisclaimer":"<p>The Avante&reg; comes in a variety of sleek finishes to match any style. Choose from Clear Aluminum for a bright, modern look, or go with Standard White for a crisp, clean finish. If you want something richer, Bronze and Chocolate painted options add warmth and depth. For those who love darker tones, Black and Dark Bronze anodized finishes create a sophisticated contrast.</p><p>If you&rsquo;re after something unique, Clopay&rsquo;s custom <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; program</a> lets you pick from over 1,500 colors, so you can match your home&rsquo;s style down to the last detail. While anodized finishes offer a beautiful metallic look, keep in mind there may be some color variation &mdash; for a more uniform bronze, the painted version is your best bet.</p><p><em>Due to the anodizing process, color variation may occur. The use of &ldquo;Bronze (Painted)&rdquo; is recommended\r\n        for a more consistent bronze finish color. Custom colors available.</em></p>","TopSectionDisclaimer":"","HardwareDisclaimer":"<p>The Avante&reg; keeps hardware simple and stylish. Each door comes with the option to add a sleek aluminum grip handle, designed for easy, comfortable use every time you open or close your garage. The handle&rsquo;s clean lines and sturdy construction blend well with the modern aesthetic of the door itself.</p>","DesignDisclaimer":"<p><em>*Only available on doors equipped with <a href=\"https://www.clopaydoor.com/c-power-technology\">C-Power&reg; technology</a>. Glass available in insulated tempered or laminated.</em></p><p><em>Satin etched is used in the AX/AXU models.</em><strong></strong></p>","RelatedProducts":[{"Title":"Modern Steel™","ImageUrl" ww.clopaydoor.com/images/default-source/product-images/product-designs/avante/clear-polygal-avante.webp?sfvrsn=1aef9ffd_2","Description":"CLEAR POLYGAL AVANTE","AlternativeText":"Clear Polygal"},{"Title":"Bronze Polygal","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/avante/bronze-polygal-avante.webp?sfvrsn=22eb5b70_2","Description":"BRONZE POLYGAL AVANTE","AlternativeText":"Bronze Polygal"},{"Title":"Clear Anodized (Aluminum Panel)","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/avante/clear-anodized-aluminum-avante.webp?sfvrsn=1452eda4_2","Description":"Clear Anodized Aluminum Panel Avante","AlternativeText":"Clear Anodized Aluminum"},{"Title":"Midnight Gray Glass","GroupName":"","ProductImage":"https://www.clopaydoor.com/images/default-source/product-images/product-designs/avante/midnight-gray-avante-1.webp?sfvrsn=a179a387_1","Description":"Avante Midnight Gray Glass","AlternativeText":"Midnight Gray Glass"}],"MaterialOptions":[],"SpecialityGlassOptions":[],"SpecsModels":[],"TrackJambModels":[]},"23":{"ProductId":"23","Title":"Classic™ Wood","ShortDescription":"Enhance the natural character of your home with a handcrafted Classic™ Wood garage door","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/classic-wood-design-short-stockton-window-cedar-garage-door-595.webp?sfvrsn=91462566_2","CanonicalUrl":"https://www.clopaydoor.com/classicwood","Overview":"<h3>Warmth, Character, and Versatility</h3><h4>Authentic Wood Construction</h4><p>Choose from single-layer solid wood or energy-efficient three-layer insulated options, all expertly built for strength and reliability.</p><h4>Premium Materials</h4><p>Available in sustainably sourced redwood, hemlock, or cedar, plus paint-grade Extira&reg; wood composite for a truly custom look.</p><h4>Tailored to You</h4><p>Pick from raised, recessed, or flush panel designs, with your choice of optional hand-carved windows and decorative hardware to match your home&rsquo;s style.</p><h4>Finish It Your Way</h4><p>Select a primed door, elegant white paint, or one of nine rich stains that highlight natural wood grain&mdash;or get creative with over 1,500 custom <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg;</a> paint colors.</p><h4>Insulation Where You Want It</h4><p>Enjoy added comfort and efficiency with <a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-materials/insulation\">polystyrene insulation</a> (R-value 5.9) on Model 33 flush panel doors.</p><h4>Built for the Elements</h4><p><a href=\"https://www.clopaydoor.com/buyingguide/residential/windcode-residential-information\">WindCode&reg; reinforcement</a> is available for extra protection in high-wind areas.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<p>Every Classic&trade; Wood garage door is handcrafted in the USA. Depending on the model, you&rsquo;ll get either solid, single-layer wood construction or a three-layer insulated design for extra comfort and durability. Thoughtful details make maintenance simple. Plus, you&rsquo;re covered by Clopay&rsquo;s warranties&mdash;one year for construction and paint, and two years for stain&mdash;so you can feel confident in your investment.Options include:</p><h4>Model 44 Raised Panel Wood Garage Doors</h4><ul><li>1-3/8\" heavy-duty stile and rail and dowel pin construction</li><li>Handcrafted short or long raised panels in Redwood, Cedar, Hemlock (stain grade) or Extira&reg; (paint grade)</li><li>Handcrafted wood decorative windows, available in six designs</li></ul><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-classic-wood-model-44.webp?sfvrsn=5ea0128d_1\" alt=\"Model 44\" sf-size=\"100\" /><ol><li>Wood Frame and Panels</li></ol><h4>Model 20/10 Recessed Panel Wood Garage Doors</h4><ul><li>Handcrafted 1-3/8\" section thickness with stile and rail construction in Hemlock</li><li>Model 20 offers Luan or Okoume panels, both available in stain grade or paint grade options.</li><li>Model 10 features paint grade Hardboard panels.</li></ul><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-classic-wood-model-20-10.webp?sfvrsn=76bea457_1\" alt=\"Classic Wood\" sf-size=\"100\" /><ol><li>Wood Frame and Panels</li></ol><h4>Model 33 Flush Panel Wood Garage Doors</h4><ul><li>Three-layer construction with polystyrene insulation sandwiched between interior and exterior boards. Interior Luan backer. R-value 5.9.</li><li>Calculated garage door section R-value is in&nbsp;accordance with DASMA TDS-163.</li><li>Heavy-duty 1-5/8\" section thickness</li><li>Exterior wood options include Smooth Luan and Okoume.</li></ul><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-classic-wood-model-33.webp?sfvrsn=6fe2c0b6_1\" alt=\"Model 33\" sf-size=\"100\" /><ol><li>Wood Exterior Board</li><li>Polystyrene Insulated Wood Frame</li><li>Wood Interior Board</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Classic Wood","DisplayIndex":20,"ImageGallery":"https://www.clopaydoor.com/image-gallery/classic-wood","ColorDisclaimer":"<p>Make your Classic&trade; Wood garage door your own with a curated selection of rich stains and paints. Each finish is designed to bring out the natural character of the wood, letting you match or accent your home&rsquo;s exterior.</p><p>Choose from nine beautiful stain options including Natural, Natural Oak, Cedar, Teak, Butternut, Mahogany, Dark Oak, Dark Oak Ebony Wash, and Ebony Wash. These stains enhance the wood&rsquo;s grain and warmth, giving you everything from light, golden tones to deep, dramatic finishes.</p><p>If you prefer a painted look, choose crisp white for a timeless, clean appearance that works with almost any style. For even more personalization, Clopay offers over 1,500 custom<a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\"> Color Blast&reg; paint options</a>, so you can find the best shade to complement your home.</p>","TopSectionDisclaimer":"<p>With your Classic™ Wood door each model offers a variety of top section options, so you can tailor your door’s look to your taste.</p>\r\n<ul><li>Model 44: Go for solid panels for a clean, understated style, or add windows in designs like Stockton, Cathedral, Sherwood, or Horizon to brighten up your garage and boost visual interest. Short and long configurations are available to match your door’s panel style.</li>\r\n<li>Model 20 & 10: Enjoy the same flexibility, with solid or windowed top sections (including Stockton, Cathedral, Horizon, and Sherwood styles), available in both short and long versions.</li>\r\n<li>Model 33: Choose from plain short or long top sections for a streamlined, modern finish.</li>\r\n","HardwareDisclaimer":"","DesignDisclaimer":"","RelatedProducts":[{"Title":"Modern Steel™","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/modern-steel-flush_fullview-window-black-garage-door-595.webp?sfvrsn=db7014e9_14","Id":"170","Url":"https://www.clopaydoor.com/modern-steel-collection","DisplayIndex":7,"ShortDescription":"Subtle modern beauty, simple up-keep","AlternativeText":"Modern Steel"},{"Title":"Avante<sup class='symbolstxt'>®</sup> – Now Available with C-Power™ Technology","ImageU x":3},{"Title":"Roughsawn Okoume","ThumbnailImage":"https://www.clopaydoor.com/images/default-source/product-images/garage-doors/material-options/breckenridge.webp?sfvrsn=bb2cf055_1","AlternativeText":"Wood","DisplayIndex":3,"GroupName":"Model 20 and 10","GroupIndex":2}],"SpecialityGlassOptions":[],"SpecsModels":[],"TrackJambModels":[]},"25":{"ProductId":"25","Title":"Reserve<sup class='symbolstxt'>®</sup> Wood Modern","ShortDescription":"Clean lines and simple forms invite the beauty of natural wood stand out","Description":"","ThumbnailImage":null,"ShowcaseImage":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/reserve-modern-design-cladding-solid-garage-door-595.webp?sfvrsn=b04b7a7a_9","CanonicalUrl":"https://www.clopaydoor.com/reserve-modern-contemporary-garage-doors","Overview":"<h3>Modern Style, Real Wood Warmth</h3><h4>Premium 4-Layer Build</h4><p>Each door combines natural wood cladding, a sturdy base core, polystyrene insulation, and a smooth wood backer for long-lasting strength and energy efficiency.</p><h4>Custom Looks, Your Way</h4><p>Pick from seven sleek designs and six gorgeous wood species plus optional windows or metal accent strips. Finish it off with paint, stain, or choose from over 1,500 <a href=\"https://www.clopaydoor.com/residential/buyingguide/colorblast\">Color Blast&reg; custom colors</a>.</p><h4>Energy-Smart Insulation</h4><p><a href=\"https://www.clopaydoor.com/residential/buyingguide/garage-door-materials/insulation\">Polystyrene insulation</a> (R-value 5.9) keeps your garage more comfortable, no matter the weather.</p><h4>Built for the Elements</h4><p>Add Clopay&rsquo;s WindCode&reg; reinforcement for extra strength in areas prone to high winds.</p><h4>Environmental Assurance</h4><p>Clopay doors are compliant with environmental laws and regulations. Clopay doors do not contain HFCs. All Clopay doors are compliant with:</p><ul><li>California SB 1013</li><li>Washington HB 1112 &ndash; Hydrofluorocarbon Greenhouse Gas Emissions</li><li>Canadian regulations amending the ozone-depleting substances and halocarbon alternatives regulations</li><li>New Jersey A-5583/S-3919 &ndash; Greenhouse Gas Bill</li></ul>","Options":"","Construction":"<h3>How It&rsquo;s Made: Reserve&reg; Wood Modern</h3><p>Every Reserve&reg; Wood Modern garage door is engineered for durability and style. At its core, you&rsquo;ll find a solid Hemlock wood frame packed with polystyrene insulation to boost energy efficiency and block out the elements. On the outside, beautiful wood cladding gives each door its unique character, while a Luan wood backer adds an extra layer of strength and a clean interior finish.</p><p>Durable hardware, including heavy-duty hinges, rollers, and track, keeps your door running smoothly and quietly. For added protection, an optional vinyl weather seal (in a rust-resistant aluminum retainer) helps keep out drafts and moisture, guarding your garage from the elements. Each door also features Clopay&rsquo;s patented Safe-T-Bracket&reg;, designed to prevent injuries when the door is under tension.</p><img src=\"https://www.clopaydoor.com/images/default-source/product-images/construction/cutaway-reserve-wood-modern.webp?sfvrsn=6e970bbc_2\" alt=\"Reserve Wood Modern\" sf-size=\"100\" /><ol><li>Cladding</li><li>Base Material</li><li>Polystyrene Insulated Hemlock Frame</li><li>Luan Inside Skin</li></ol>","Models":"","FeaturesBenefits":"","SpringsHardware":"","GroupName":"","H1HeaderTitle":"Reserve Wood Modern","DisplayIndex":17,"ImageGallery":"https://www.clopaydoor.com/image-gallery/reserve-wood-modern","ColorDisclaimer":"<p>Your Reserve&reg; Wood Modern garage door is available in a beautiful range of stain colors designed to bring out the natural character of the wood. Choose from classics like Natural, Natural Oak, Cedar, Teak, Butternut, Mahogany, and Dark Oak for rich, authentic tones that highlight the wood&rsquo;s unique grain.</p><p>For a more dramatic, modern look, select Dark Oak Ebony Wash or Ebony Wash &mdash; two deep, bold finishes that make a statement. All stain colors are carefully formulated to complement the door&rsquo;s real wood construction, enhancing texture and depth for stunning curb appeal.</p><p><em>Clopay stain colors shown on Cedar wood. Note: Color may vary from on screen. Custom colors are available.</em></p>","TopSectionDisclaimer":"","HardwareDisclaimer":"","DesignDisclaimer":"<p>With the Reserve&reg; Wood Modern garage door, you can choose from striking offset window patterns, where a mix of short and long glass panels brings in natural light with a contemporary edge. If you love contrast, accent strip designs feature sleek aluminum flush strips set between wood planks, creating eye-catching lines and a hint of flair.</p><p>If you prefer something a bit more streamlined, go for the horizontal cladding design. You&rsquo;ll get classic wood planks arranged in full or alternating lengths for a clean, minimalist look. Many designs are available in both right-hand and left-hand configurations, so you can tailor the look to your home&rsquo;s architecture. For doors up to 10 feet wide, ask about seamless &ldquo;no splice&rdquo; options for an uninterrupted appearance.</p><p><em>*Design is available right hand and left hand.<br />**Unspliced models are only available up to 10' wide.</em></p>","RelatedProducts":[{"Title":"Modern Steel™","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/modern-steel-flush_fullview-window-black-garage-door-595.webp?sfvrsn=db7014e9_14","Id":"170","Url":"https://www.clopaydoor.com/modern-steel-collection","DisplayIndex":7,"ShortDescription":"Subtle modern beauty, simple up-keep","AlternativeText":"Modern Steel"},{"Title":"Avante<sup class='symbolstxt'>®</sup> – Now Available with C-Power™ Technology","ImageUrl":"https://www.clopaydoor.com/images/default-source/product-images/showcase-images/tnahcpower01showcase.webp?sfvrsn=e1a1ed6c_1","Id":"16","
